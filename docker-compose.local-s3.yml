# Local S3 Backend — overlay that adds MinIO for indexing local files.
#
# Spins up a MinIO instance backed by a host directory, so you can index
# your own local USD/3D assets without needing a remote S3 bucket or AWS
# credentials.
#
# Note: MinIO copies files from the host directory into a Docker volume at
# startup (via mc mirror). This is closer to a production S3 deployment and
# MinIO can later be moved or scaled for larger deployments. For a
# transparent local-path experience (no copy step, API returns local paths),
# see docker-compose.local-fs.yml instead.
#
# Usage:
#   # Place assets in ./local-assets/ (any directory structure works):
#   mkdir -p local-assets
#   cp /path/to/my-scene.usd local-assets/
#
#   # Start the stack:
#   docker compose -f docker-compose.yml -f docker-compose.local-s3.yml up --build
#
#   # With GPU plugins (rendering + thumbnail generation):
#   docker compose -f docker-compose.yml -f docker-compose.gpu-plugins.yml \
#     -f docker-compose.local-s3.yml up --build
#
# Environment variables (all optional):
#   LOCAL_S3_DATA_DIR   — host path to your assets (default: ./local-assets)
#   LOCAL_S3_BUCKET     — bucket name inside MinIO (default: usdsearch-local)
#
# MinIO web console: http://localhost:9001 (login: minioadmin / minioadmin,
#   or your MINIO_ROOT_USER / MINIO_ROOT_PASSWORD if overridden — LOCAL DEV ONLY)
# MinIO S3 API:      http://localhost:9000 (anonymous access — no credentials needed)

x-local-s3-env: &local-s3-env
  S3_STORAGE_AWS_ENDPOINT_URL: http://minio:9000
  S3_STORAGE_BUCKET_NAME: ${LOCAL_S3_BUCKET:-usdsearch-local}
  S3_STORAGE_REGION_NAME: us-east-1

services:
  # ─── MinIO (S3-compatible local storage) ─────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: usdsearch-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # CHANGE BEFORE NON-LOCAL USE — local-dev MinIO root creds. Override via
      # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD (minio-init reads the same vars).
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      # Use a named Docker volume for MinIO's data dir to avoid cross-device
      # mount issues on Docker for Mac (Colima/VirtioFS). User assets are
      # mounted separately at /source-data and mirrored in by minio-init.
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio-init:
    image: minio/mc:latest
    container_name: usdsearch-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    volumes:
      - ${LOCAL_S3_DATA_DIR:-./local-assets}:/source-data:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${LOCAL_S3_BUCKET:-usdsearch-local};
      mc anonymous set public local/${LOCAL_S3_BUCKET:-usdsearch-local};
      mc mirror --overwrite /source-data local/${LOCAL_S3_BUCKET:-usdsearch-local};
      echo 'MinIO bucket ready: ${LOCAL_S3_BUCKET:-usdsearch-local}';
      "

  # ─── Service overrides (point all services at MinIO) ─────────────────────

  deepsearch-api:
    environment:
      <<: *local-s3-env
    depends_on:
      minio-init:
        condition: service_completed_successfully

  info-endpoint:
    environment:
      <<: *local-s3-env
    depends_on:
      minio-init:
        condition: service_completed_successfully

  deepsearch-crawler:
    environment:
      <<: *local-s3-env
      # Faster rescan for local dev iteration (default is 3600s)
      S3_STORAGE_RE_SCAN_TIMEOUT: "60"
    depends_on:
      minio-init:
        condition: service_completed_successfully

  indexing-crawler:
    environment:
      <<: *local-s3-env

  monitor-crawler:
    environment:
      <<: *local-s3-env

  monitor-worker-image-to-embedding:
    environment:
      <<: *local-s3-env

  monitor-worker-thumbnail-to-embedding:
    environment:
      <<: *local-s3-env

  monitor-worker-asset-graph-generation:
    environment:
      <<: *local-s3-env

  omni-writer:
    environment:
      <<: *local-s3-env

  graph-builder:
    environment:
      S3_STORAGE_AWS_ENDPOINT_URL: http://minio:9000
    depends_on:
      minio-init:
        condition: service_completed_successfully

  # ─── GPU plugin worker overrides (active only when gpu-plugins overlay is also used) ─

  rendering-job:
    environment:
      - S3_STORAGE_AWS_ENDPOINT_URL=http://minio:9000

  monitor-worker-thumbnail-generation:
    environment:
      <<: *local-s3-env

  monitor-worker-rendering-to-embedding:
    environment:
      <<: *local-s3-env

volumes:
  minio-data:
