targets:
  - concept: License
    field_name: license
    patterns: ['licen', 'copyright', '\brights\b', 'spdx']
    recommended_key: 'nvidia:license'
    note: No OpenUSD-standard key exists; needs a vendor key convention + authoring.

  - concept: Isaac Sim/Lab Version
    field_name: isaac_sim_version
    patterns: ['isaac.*version', 'isaacsim', 'isaac[_:]lab', 'kit.?version']
    recommended_key: 'isaac:version'
    note: >-
      Only present indirectly today (robot structure + nested validation-feature
      versions like FET100_BASE_ISAACSIM); no asset-level app-version field.

  - concept: SimReady Profile
    field_name: simready_profile
    patterns: ['sim.?ready.*profile', '_profile(_version)?$', '\bprofile\b']
    recommended_key: 'simready_metadata_validation__profile'
    note: Present in the SimReady corpus (Prop-Robotics-Isaac/-Physx/-Neutral, ...).

  - concept: Physics backend
    field_name: physics_backend
    patterns: ['physx', 'physics.*(backend|engine|solver)', '_backend\b']
    recommended_key: 'physics:backend'
    note: >-
      Not a standalone field; only encoded in the profile suffix (-Physx/-Isaac/
      -Neutral) and FET00x_BASE_PHYSX validation features.

  - concept: Collision type
    field_name: collision_type
    patterns: ['physics:approximation', '\bapproximation\b', 'collision.*(type|approx)']
    recommended_key: 'physics:approximation'
    note: OpenUSD-standard MeshCollisionAPI token (convexHull/convexDecomposition/...).
