{{ $apiGateway := ( index .Values "api-gateway" ) }}
{{ $cors := printf "\"%s\"" (join " " $apiGateway.extraSettings.cors.allowedOrigins) -}}

{{- if .Values.api_gateway_deployment.enabled }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $apiGateway.existingServerBlockConfigmap | default "deepsearch-api-gateway-config" }}
data:
  nginx.conf: |
    server {
      listen 0.0.0.0:8080;
      http2 on;
      
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_buffering on;
      proxy_buffer_size 8k;
      proxy_buffers 16 8k;
      
      gzip on;
      gzip_vary on;
      gzip_min_length 1024;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

      location / {
          if ($request_method = OPTIONS) {
            {{ if $apiGateway.extraSettings.cors.enabled }}
              add_header Access-Control-Allow-Origin {{ $cors }} always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
            {{ end }}
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
          }
        }

      {{ if $apiGateway.extraSettings.cors.enabled }}
        add_header Access-Control-Allow-Origin {{ $cors }} always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
      {{ end }}

      {{ if .Values.asset_graph_service_deployment.enabled }}
        location /asset_graph/usd/scene_summary/ {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin {{ $cors }} always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            
            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin {{ $cors }} always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}

          # Redirect /asset_graph/usd/scene_summary (with trailing slash) to /asset_graph/usd/scene_summary/ (with trailing slash)
          rewrite ^/asset_graph/usd/scene_summary/(.*)$ /asset_graph/usd/scene_summary/$1 break;
          proxy_pass http://{{ .Release.Name }}-asset-graph-service.{{ .Release.Namespace }}.svc.cluster.local:8000;
          
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /asset_graph/usd/scene_summary {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin {{ $cors }} always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin {{ $cors }} always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}

          # Redirect /asset_graph/usd/scene_summary (without trailing slash) to /asset_graph/usd/scene_summary/ (with trailing slash)
          rewrite ^/asset_graph/usd/scene_summary(.*)$ /asset_graph/usd/scene_summary/$1 break;
          proxy_pass http://{{ .Release.Name }}-asset-graph-service.{{ .Release.Namespace }}.svc.cluster.local:8000;
          
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /asset_graph/usd/prims {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin {{ $cors }} always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin {{ $cors }} always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}

          rewrite ^/asset_graph/usd/prims(.*)$ /asset_graph/usd/prims$1 break;
          proxy_pass http://{{ .Release.Name }}-asset-graph-service.{{ .Release.Namespace }}.svc.cluster.local:8000;
          
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      
        location /dependency_graph {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin {{ $cors }} always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin {{ $cors }} always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}

          rewrite ^/dependency_graph(.*)$ /dependency_graph$1 break;
          proxy_pass http://{{ .Release.Name }}-asset-graph-service.{{ .Release.Namespace }}.svc.cluster.local:8000;
      
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      {{ end }}

        location /search {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin {{ $cors }} always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin {{ $cors }} always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}

          rewrite ^/search(.*)$ /v2/deepsearch/search$1 break;
          proxy_pass http://{{ .Release.Name }}-ngsearch-ngsearch-rest-api.{{ .Release.Namespace }}.svc.cluster.local:8000;
          
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

      location /search_hybrid {
        {{ if $apiGateway.extraSettings.cors.enabled }}
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
        {{ end }}

        rewrite ^/search_hybrid(.*)$ /v3/deepsearch/search$1 break;
        proxy_pass http://{{ .Release.Name }}-ngsearch-ngsearch-rest-api.{{ .Release.Namespace }}.svc.cluster.local:8000;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

      location /vlm_validate/search_result {
        {{ if $apiGateway.extraSettings.cors.enabled }}
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
        {{ end }}

        rewrite ^/vlm_validate/search_result(.*)$ /v3/deepsearch/vlm_validate/search_result$1 break;
        proxy_pass http://{{ .Release.Name }}-ngsearch-ngsearch-rest-api.{{ .Release.Namespace }}.svc.cluster.local:8000;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

      location /images {
        {{ if $apiGateway.extraSettings.cors.enabled }}
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
        {{ end }}
        rewrite ^/images(.*)$ /v3/images$1 break;
        proxy_pass http://{{ .Release.Name }}-ngsearch-ngsearch-rest-api.{{ .Release.Namespace }}.svc.cluster.local:8000;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

      location /metrics {
        {{ if $apiGateway.extraSettings.cors.enabled }}
          add_header Access-Control-Allow-Origin "*" always;
          add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
          add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
        {{ end }}
        proxy_pass http://{{ .Release.Name }}-ngsearch-ngsearch-rest-api.{{ .Release.Namespace }}.svc.cluster.local:8000;

          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /info {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}
          proxy_pass http://{{ .Release.Name }}-deepsearch-info-endpoint.{{ .Release.Namespace }}.svc.cluster.local:8000;
      
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /process {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}
          proxy_pass http://{{ .Release.Name }}-deepsearch-info-endpoint.{{ .Release.Namespace }}.svc.cluster.local:8000;
      
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}
          alias /usr/share/nginx/html/docs/;
          autoindex on;
          expires 1h;
          add_header Cache-Control "public, immutable";
        }
      
      {{ if .Values.deepsearch_explorer_deployment.enabled }}
      
        location /ui {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}
          rewrite ^/ui(.*)$ /$1 break;
          proxy_pass http://{{ .Release.Name }}-deepsearch-explorer.{{ .Release.Namespace }}.svc.cluster.local;
      
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }      
      
        location /static/ {
          {{ if $apiGateway.extraSettings.cors.enabled }}
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin "*" always;
              add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
              add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
              add_header Access-Control-Max-Age 3600 always;
              add_header Content-Length 0;
              add_header Content-Type "text/plain";
              return 204;
            }
          {{ end }}
          proxy_pass http://{{ .Release.Name }}-deepsearch-explorer.{{ .Release.Namespace }}.svc.cluster.local;
          expires 24h;
          add_header Cache-Control "public, immutable";
      
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      
      {{ if $apiGateway.extraSettings.redirectToUIWhenAvailable }}
      location = / {
          return 301 /ui;
        }
      {{ else }}
        location = / {
          return 301 /docs;
        }
      {{ end }}
    {{ else }}
      location = / {
          return 301 /docs;
        }
    {{ end }}
      }

{{- end }}