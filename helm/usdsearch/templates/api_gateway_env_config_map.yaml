{{ $apiGateway := ( index .Values "api-gateway" ) }}

{{- if .Values.api_gateway_deployment.enabled }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $apiGateway.envConfigmap | default "deepsearch-api-gateway-env-config" }}
data:
    ags_url: "http://{{ .Release.Name }}-asset-graph-service:8000/openapi.json"
    ds_url: "http://{{ .Release.Name }}-ngsearch-ngsearch-rest-api:8000/openapi.json"
    info_url: "http://{{ .Release.Name }}-deepsearch-info-endpoint:8000/openapi.json"
    OPENAPI_SPEC_OUTPUT_DIR: "/usr/share/nginx/html/docs"
    {{- if ne .Chart.Version "0.0.1" }}
    API_VERSION: "{{ .Chart.Version }}"
    {{ end }}

{{- end }}