    - version

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $releaseName }}-metrics-search-metadata
  labels:
    prometheus: kube-prometheus
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
