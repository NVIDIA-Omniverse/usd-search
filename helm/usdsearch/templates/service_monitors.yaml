---
  {{- if .Values.rendering_service_deployment.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $releaseName }}-metrics-rendering-service
  labels:
    prometheus: kube-prometheus
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      usdsearch.service.name: rendering-service
  podMetricsEndpoints:
  - port: http
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: hostname
  podTargetLabels:
    - release_name
    - component
    - version
    - hostname
  {{- end }}

{{- end }}
