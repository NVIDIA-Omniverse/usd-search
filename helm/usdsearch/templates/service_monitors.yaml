{{  $releaseName := include "deepsearch-global.releaseName" . -}}
{{- $labels := include "deepsearch-global.labels" . -}}

{{- if .Values.deployServiceMonitors }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $releaseName }}-asset-graph-service
  labels:
    prometheus: kube-prometheus
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: asset-graph-service
  endpoints:
  - port: http
    path: /metrics
  targetLabels:
    - release_name
    - component
    - version

---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $releaseName }}-crawler
  labels:
    prometheus: kube-prometheus
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      deepsearch.service.name: deepsearch-crawler
  podMetricsEndpoints:
  - port: metrics
  podTargetLabels:
    - release_name
    - component
    - version
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $releaseName }}-metrics-embedding-metadata
  labels:
    prometheus: kube-prometheus
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      deepsearch.service.name: embedding
  podMetricsEndpoints:
  - port: metrics
  podTargetLabels:
    - release_name
    - component
    - version

{{- range $plugin_name, $plugin_config := .Values.deepsearch.plugins }}

  {{- if $plugin_config.active }}

---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $releaseName }}-worker-{{ $plugin_config.preview_name | replace "_" "-" }}
  labels:
    prometheus: kube-prometheus
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      deepsearch.service.name: worker-{{ $plugin_name }}
  podMetricsEndpoints:
  - port: metrics
  podTargetLabels:
    - release_name
    - component
    - version

  {{- end }}

{{- end }}

---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $releaseName }}-metrics-monitor-crawler
  labels:
    prometheus: kube-prometheus
    {{- $labels | nindent 4 }}
spec:
  selector:
    matchLabels:
      deepsearch.service.name: monitor-crawler
  podMetricsEndpoints:
  - port: metrics
  podTargetLabels:
    - release_name
    - component
    - version

---
apiVersion: monitoring.coreos.com/v1
