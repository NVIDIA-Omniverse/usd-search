{{  if and .Values.global.checks.explorer_ui.enabled .Values.deepsearch_explorer_deployment.enabled }}
{{- $releaseName := include "deepsearch-global.releaseName" . -}}
{{- $globalImagePullSecrets := include "deepsearch-global.imagePullSecrets" . -}}

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $releaseName }}-explorer-ui-check
  labels:
    {{- include "deepsearch-global.labels" . | nindent 4 }}
  annotations:
  {{- toYaml .Values.global.checks.explorer_ui.annotations | nindent 4}}
spec:
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 3600
  backoffLimit: {{ .Values.global.checks.explorer_ui.backoff_limit }}
  template:
    spec:
      {{- $globalImagePullSecrets | nindent 6 }}
      restartPolicy: "OnFailure"
      containers:
        - name: connection-check
          {{- $apiImg := .Values.ngsearch.microservices.search_rest_api.image }}
          {{- if $apiImg.name }}
          image: {{ .Values.global.registry }}/{{ $apiImg.name }}:{{ $apiImg.tag | default (include "deepsearch-global.unifiedImageTag" .) }}
          {{- else }}
          image: {{ include "deepsearch-global.usdsearchImage" . }}
          {{- end }}
          command:
          - python
          - -c
          - |
            import requests, time
            response = requests.get('http://{{ .Release.Name }}-deepsearch-explorer.{{ .Release.Namespace }}.svc.cluster.local')
            assert response.status_code == 200
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 128Mi
{{- end }}
