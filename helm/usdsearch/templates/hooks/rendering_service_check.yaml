{{  if and .Values.global.checks.rendering_service.enabled .Values.deepsearch.microservices.rendering_service.enabled }}
{{- $releaseName := include "deepsearch-global.releaseName" . -}}
{{- $globalImagePullSecrets := include "deepsearch-global.imagePullSecrets" . -}}

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $releaseName }}-rendering-service-check
  labels:
    {{- include "deepsearch-global.labels" . | nindent 4 }}
  annotations:
  {{- toYaml .Values.global.checks.rendering_service.annotations | nindent 4}}
spec:
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 3600
  backoffLimit: {{ .Values.global.checks.rendering_service.backoff_limit }}
  template:
    spec:
      {{- $globalImagePullSecrets | nindent 6 }}
      restartPolicy: "OnFailure"
      containers:
        - name: connection-check
          {{- $apiImg := .Values.ngsearch.microservices.search_rest_api.image }}
          {{- if $apiImg.name }}
          image: {{ .Values.global.registry }}/{{ $apiImg.name }}:{{ $apiImg.tag | default (include "deepsearch-global.unifiedImageTag" .) }}
          {{- else }}
          image: {{ include "deepsearch-global.usdsearchImage" . }}
          {{- end }}
          command:
          - python
          - -c
          - |
            import requests, time, os
            response = requests.get(f"{os.getenv('DEEPSEARCH_RENDERER_CONFIG_RENDERING_SERVICE_URL')}/health", headers={"Authorization": f"Bearer {os.getenv('DEEPSEARCH_RENDERER_CONFIG_API_KEY', '')}"})
            assert response.status_code == 200
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 128Mi
          env:
          {{- if .Values.deepsearch.microservices.rendering_service.settings.rendering_service_url }}
          - name: DEEPSEARCH_RENDERER_CONFIG_RENDERING_SERVICE_URL
            value: {{ .Values.deepsearch.microservices.rendering_service.settings.rendering_service_url }}
          {{- else }}
          - name: DEEPSEARCH_RENDERER_CONFIG_RENDERING_SERVICE_URL
            value: "http://{{ .Release.Name }}-rendering-service.{{ .Release.Namespace }}.svc.cluster.local:8000"
          {{- end }}
          {{- if .Values.deepsearch.microservices.rendering_service.authentication.enabled }}
          - name: DEEPSEARCH_RENDERER_CONFIG_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Values.deepsearch.microservices.rendering_service.authentication.api_key_secret_name }}
                key: {{ .Values.deepsearch.microservices.rendering_service.authentication.api_key_secret_field }}
          {{- end }}

{{- end }}
