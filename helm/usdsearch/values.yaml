        #     --set ngsearch.microservices.search_rest_api.validation.vlm_service.google.parameters.model=gemini-2.5-pro
        # ```
        #
        # @notationType -- yaml
        google:
          api_key_secret_name: "google-vlm-api-key-secret"
          api_key_secret_field: "api-key"
          api_key: ""
          env_prefix: "GOOGLE_"
