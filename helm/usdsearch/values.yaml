deepsearch_explorer_deployment:
  enabled: false

deepsearch-explorer:
  containerPorts:
    https: ""
  service:
    type: ClusterIP
  image:
    registry: nvcr.io/omniverse/deeptag-internal
    repository: deepsearch-explorer
    image: deepsearch
    tag: latest

  # this is required to allow using the images that are not default in the helm chart
  global:
    security:
      allowInsecureImages: true

api_gateway_deployment:
  enabled: true

api-gateway:
  # # Note Uncomment if needed
  # image:
  #   pullSecrets:
  #   - name: nvcr.io

  image:
    repository: bitnamilegacy/nginx

  # --
  # @raw
  #
  # API Gateway service configuration. By default the ClusterIP service type is
  # used. Please refer to [NGINX helm chart service configuration](https://github.com/bitnami/charts/blob/main/bitnami/nginx/README.md#traffic-exposure-parameters)
  # for a complete list of settings.
  resources:
    requests:
      cpu: 1
      memory: 512Mi
    limits:
      cpu: 1
      memory: 512Mi
  service:
    type: ClusterIP
  existingServerBlockConfigmap: "deepsearch-api-gateway-config"
  envConfigmap: "deepsearch-api-gateway-env-config"
  extraVolumeMounts:
    - name: shared-localdir
      mountPath: /usr/share/nginx/html/docs
  extraVolumes:
    - name: shared-localdir
      configMap:
        name: deepsearch-api-gateway-static-content


  extraSettings:
    # if true, redirect to the UI instead of the docs
    redirectToUIWhenAvailable: true
    cors:
      enabled: false
      allowedOrigins:
        - "*"

neo4j_deployment:
  # -- (bool)
  #
  # trigger to enable Neo4j helm chart deployment
  enabled: true

asset_graph_service_deployment:
  # -- (bool)
  #
  # trigger to enable Asset Graph Service (AGS) helm chart deployment
  enabled: true

asset-graph-service:
  # -- (string)
  #
  # Sentry Data Source Name. By default this field is unset, however it is
  # possible to configure it to an appropriate DSN value to be able to collect
  # events that are associated with the AGS deployment.
  sentry_dsn: ""

  # Settings for interaction with Neo4j backend.
  graphdb:

    # -- (map)
    # @raw
    #
    # Number of parallel workers that would be writing data to Neo4j.
    # Increasing this number results in faster processing, but will in turn
    # require scaling the Neo4j instance.
    n_workers: 5

neo4j:
  # --
  #
  # Name of the Neo4j instance
  #
  fullnameOverride: neo4j
  # -- (map)
  #
  # Neo4j authentication and resource settings
  # @notationType -- yaml
  neo4j:
    name: neo4j
    password: "password"
    resources:
      requests:
        cpu: "4000m"
        memory: "14Gi"
      limits:
        cpu: "4000m"
        memory: "14Gi"
  serviceMonitor:
    enabled: false
  volumes:
    data:
      # -- (string)
      # @raw
      #
      # **REQUIRED**: specify a volume mode to use for data
      # Valid values are:
      #   * share
      #   * selector
      #   * defaultStorageClass
      #   * volume
      #   * volumeClaimTemplate
      #   * dynamic
      #
      # To get up-and-running quickly, for development or
      # testing, use ``defaultStorageClass`` for a dynamically
      # provisioned volume of the default storage class.
      mode: "defaultStorageClass"
      defaultStorageClass:
        accessModes:
          - ReadWriteOnce
        requests:
          storage: 100Gi
  # -- (map)
  #
  # Neo4j configuration settings
  # @notationType -- yaml
  config:
    server.config.strict_validation.enabled: "false"
    server.memory.heap.initial_size: "8000m"
    server.memory.heap.max_size: "8000m"
  env:
    # --
    #
    # Neo4j plugins configuration
    NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
  # -- (map)
  #
  # Neo4j service settings
  # @notationType -- yaml
  services:
    neo4j:
      enabled: true
      annotations: {}
      spec:
        type: ClusterIP

  livenessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - |
          USER=$(cat /config/neo4j-auth/NEO4J_AUTH | cut -d'/' -f1)
          PASS=$(cat /config/neo4j-auth/NEO4J_AUTH | cut -d'/' -f2)
          cypher-shell --non-interactive -u "$USER" -p "$PASS" "RETURN 1" || exit 1

# -- (map)
# @raw
#
# It is possible to disable the USD Search Crawler functionality if it is not needed.
# @notationType -- yaml
deepsearch_crawler:
  enabled: true

# -- (map)
# @raw
#
# By default an OpenSearch instance is deployed as part of the USD Search API
# helm chart. It is, however, possible to rely on a separately installed instance
# of OpenSearch. To do so, you can set the following command line argument during
# helm chart deployment:
#
# ```bash
#   --set opensearch_deployment.enabled=false
# ```
#
# @notationType -- yaml
opensearch_deployment:
  enabled: true

opensearch_dashboards_deployment:
  enabled: false

# -- (map)
# @raw
#
# A Redis instance can be deployed as part of USD Search API helm chart.
# Set ``enabled: false`` if you wish to use your own instance.
#
# @notationType -- yaml
redis_deployment:
  enabled: true

# --
# @raw
#
# Config maps with grafana dashboards cen be deployed as part of this helm chart.
deployGrafanaDashboards: false

# --
# @raw
#
# ServiceMonitor resources for Prometheus Operator can be deployed as part of this helm chart.
deployServiceMonitors: false

# --
# @raw
#
# Rendering service deployment configuration.
# @notationType -- yaml
rendering_service_deployment:
  enabled: false

global:

  ################################################################################
  ## End-User License Agreement (EULA)
  ################################################################################

  # --
  # @raw
  #
  # Set the following to true to indicate your acceptance of EULA.
  accept_eula: false

  ################################################################################
  ## Embedding services deployment setup
  ################################################################################


  # -- (map)
  # @raw
  #
  # Embedding service instance is deployed with USD Search API Helm
  # chart by default. It can be disabled, but in that case an alternative
  # endpoint must be provided.
  #
  # @notationType -- yaml
  embedding_deployment:
    endpoint: ""
    triton_server:
      ssl:
        enabled: false
      headers: {}
    authentication:
      enabled: false
      token:
      secret_key: token
      secret_name: embedding-service-secret

  ################################################################################
  ## IP of the kubernetes server node
  ################################################################################

  # --
  # @raw
  #
  # Please specify (preferably) the hostname or the IP of the Kubernetes
  # cluster node, where USD Search API helm chart is running. This address will
  # be used for service registration when using NodePort services.
  nodeIP: ""


  s3proxy:
    enabled: false

  ################################################################################
  ## Storage Backend configuration
  ################################################################################

  # --
  # @raw
  #
  # Set the desired storage backend type. Supported options are the following:
  #
  #  * s3 - AWS S3 bucket storage
  #  * nucleus - Omniverse Nucleus Server
  #  * storage_api - Omniverse Storage API (beta functionality). Please refer to [Omniverse Storage API](https://catalog.ngc.nvidia.com/orgs/nvidia/teams/omniverse/collections/storage_apis) for more information.
  #
  storage_backend_type: s3

  # --
  # @raw
  #
  # By default trace collection is disabled. Is it optionally possible to enable
  # trace collection for USD Search REST API and AGS
  # services. In order to do so, please set `OTEL_SDK_DISABLED` to "false" and `OTEL_TRACES_EXPORTER` to "true" and provide a valid `OTEL_EXPORTER_OTLP_ENDPOINT` URL as follows:
  #
  # ```bash
  #   --set global.tracing.OTEL_SDK_DISABLED=false \
  #   --set global.tracing.OTEL_TRACES_EXPORTER=true \
  #   --set global.tracing.OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
  # ```
  #
  # @notationType -- yaml
  tracing:
    OTEL_SDK_DISABLED: "true"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
    OTEL_TRACES_EXPORTER: "false"

  ################################################################################
  ## Nucleus Base Stack Location
  ################################################################################

  # --
  # @raw
  #
  # USD Search API service requires a service account with administrator rights
  # in order to index the content stored on the Nucleus server. It is possible
  # to use the main Nucleus service account, generated during the Nucleus
  # service installation time. Alternatively, it is possible to create a
  # dedicated service account for USD Search. For the exact steps on how such
  # account could be created please follow [this guide](https://docs.omniverse.nvidia.com/nucleus/latest/config-and-info/auth_user_mgmt.html#service-accounts).
  #
  # When creating your own service account it is required to grant it admin
  # access. [This guide](https://docs.omniverse.nvidia.com/nucleus/latest/config-and-info/auth_user_mgmt.html#grant-admin-access) explains this process in detail.
  #
  # After the service account's ``username`` and ``password`` are obtained, it
  # is possible to deploy the USD Search Helm chart and connect it to an
  # Omniverse Nucleus server for indexing, as follows:
  #
  # ```bash
  # helm install <deployment name> usdsearch-1.3.1.tgz \
  #  --set global.accept_eula=true \
  #  --set global.storage_backend_type=nucleus \
  #  --set global.nucleus.server=<Omniverse Nucleus server hostname or IP> \
  #  --set global.nucleus.username=<Omniverse service account name> \
  #  --set global.nucleus.password=<Omniverse service account password> \
  #  --set global.secrets.create.auth=true \
  #  --set global.secrets.create.registry=true \
  #  --set global.ngcAPIKey=<NGC API KEY> \
  #  --set api-gateway.image.pullSecrets={nvcr.io} \
  #  --set deepsearch-crawler.crawler.extraConfig.exclude_patterns={"omniverse://[^\/]+/NVIDIA.*"}
  # ```
  #
  # __NOTE__: Please refer to
  # [NGC documentation](https://docs.nvidia.com/ngc/gpu-cloud/ngc-user-guide/index.html#generating-api-key)
  # for generating the NGC API Key.
  #
  # __NOTE__: The `/NVIDIA` sample data mount is excluded from indexing by
  # default. To enable its indexing, remove the corresponding line from the
  # command. You can also customize URL patterns for indexing, as explained in
  # the [Indexing path filtering section](#indexing-path-filtering).
  #
  # ### Alternative installation options
  #
  # The above command creates all required secrets on helm chart deployment,
  # which is done for convenience. It may, however, be not acceptable in some
  # deployment scenarios to pass credential information through helm chart
  # values. To address this issue it is possible to create kubernetes secret
  # with access information manually with the following command:
  #
  # ```bash
  # kubectl create secret generic deepsearch-service-account \
  #   --from-literal=username=<Omniverse service account name> \
  #   --from-literal=password=<Omniverse service account password>
  # ```
  #
  # Similarly, it is possible to create a registry access secret with the
  # following command:
  #
  # ```bash
  # kubectl create secret docker-registry nvcr.io \
  #   --docker-server=nvcr.io \
  #   --docker-username='$oauthtoken' \
  #   --docker-password=<NGC API KEY> \
  #   --docker-email=<your-email>
  # ```
  #
  # With the above secrets created, the helm chart installation command can be
  # simplified to:
  #
  # ```bash
  # helm install <deployment name> usdsearch-1.3.1.tgz \
  #   --set global.accept_eula=true \
  #   --set global.storage_backend_type=nucleus \
  #   --set global.nucleus.server=<Omniverse Nucleus server hostname or IP> \
  #   --set deepsearch-crawler.crawler.extraConfig.exclude_patterns={"omniverse://[^\/]+/NVIDIA.*"}
  #   --set api-gateway.image.pullSecrets={nvcr.io} \
  #   --set global.imagePullSecrets={nvcr.io}
  # ```
  #
  # #### Nucleus API token
  #
  # Instead of using service account it is possible to rely on
  # [Nucleus API token](https://docs.omniverse.nvidia.com/nucleus/latest/config-and-info/api_tokens.html).
  # To do so, you need to input ``$omni-api-token`` as the username and the API
  # token value as the password. Additionally you need to pass the following
  # parameter to disable permissions check that is not required for Nucleus API
  # tokens:
  #
  # ```bash
  #   --set global.nucleus.assert_admin_user='false'
  # ```
  #
  nucleus:
    # --
    # @raw
    #
    # USD Search API is provided as a separate stack and can either run on the
    # same machine as the Base Nucleus stack or on a different one. In order for
    # USD Search API service to be able to connect to the Nucleus server please
    # provide the (preferably) hostname or the IP of the server, where
    # Nucleus Base Stack is running.
    server:

    # --
    # @raw
    #
    # Name of the Kubernetes secret that stores the information about
    # Nucleus service account authentication. The secret should have two keys
    # ``username`` and ``password``.
    #
    service_account_secret: "deepsearch-service-account"


    # --
    # @raw
    #
    # It is possible to provide the username as a parameter in order to make
    # the kubernetes secret with authentication information created on startup.
    username:

    # --
    # @raw
    #
    # It is possible to provide the password as parameters in order to make the
    # kubernetes secret with authentication information created on startup.
    password:

    # --
    # @raw
    #
    # By default USD Search connects to the external interface of the Nucleus
    # server.
    #
    # If both USD Search and Nucleus server is running in the same cluster
    # (same network) it is possible to optimize the performance by letting the
    # service use internal Nucleus server interface. In order to achieve this,
    # please set the following variable to ``internal``.
    #
    # In order for interaction with internal Nucleus server interface to work,
    # please make sure that USD Search is able to access the following list of
    # ports: https://docs.omniverse.nvidia.com/nucleus/latest/ports_connectivity.html#enterprise-nucleus-server
    deployment_lookup: "external"


    # -- (bool)
    #
    # On start-up verify that created user has admin access. In case the provided
    # user does not have admin access and the following parameter is disabled,
    # the service would still work, it just may not be able to access all
    # folders and write thumbnails in case thumbnail_generation plugin is enabled.
    #
    assert_admin_user: true

    # -- (bool)
    #
    # In some cases it may be desired to skip processing for Nucleus mounts.
    # This can be achieved by setting the following parameter to ``true``.
    #
    skip_mounts: false



  ################################################################################
  ## S3 storage backend configuration
  ################################################################################

  # --
  # @raw
  #
  # To deploy the USD Search Helm chart and connect it to an AWS S3 bucket for
  # indexing, run the following command:
  #
  #```bash
  # helm install <deployment name> usdsearch-1.3.1.tgz \
  #   --set global.accept_eula=true \
  #   --set global.storage_backend_type=s3 \
  #   --set global.s3.bucket_name=<S3 bucket name> \
  #   --set global.s3.region_name=<S3 bucket region>  \
  #   --set global.s3.aws_access_key_id=<AWS access key ID> \
  #   --set global.s3.aws_secret_access_key=<AWS secret access key>  \
  #   --set global.secrets.create.auth=true \
  #   --set global.secrets.create.registry=true \
  #   --set global.ngcAPIKey=<NGC API KEY> \
  #   --set api-gateway.image.pullSecrets={nvcr.io}
  #```
  #
  # __NOTE__: Please refer to [NGC documentation](https://docs.nvidia.com/ngc/gpu-cloud/ngc-user-guide/index.html#generating-api-key) for generating the NGC API Key.
  #
  # ### Alternative installation options
  #
  # The above command creates all required secrets on helm chart deployment,
  # which is done for convenience. It may, however, be not acceptable in some
  # deployment scenarios to pass credential information through helm chart
  # values. To address this issue it is possible to create kubernetes secret
  # with access information manually with the following command:
  #
  # ```bash
  # kubectl create secret generic deepsearch-s3-credentials \
  #   --from-literal=AWS_ACCESS_KEY_ID=<AWS access key ID> \
  #   --from-literal=AWS_SECRET_ACCESS_KEY=<AWS secret access key>
  # ```
  #
  # Similarly, it is possible to create a registry access secret with the
  # following command:
  #
  # ```bash
  # kubectl create secret docker-registry nvcr.io \
  #   --docker-server=nvcr.io \
  #   --docker-username='$oauthtoken' \
  #   --docker-password=<NGC API KEY> \
  #   --docker-email=<your-email>
  # ```
  #
  # With the above secrets created, the helm chart installation command can be
  # simplified to:
  #
  # ```bash
  # helm install <deployment name> usdsearch-1.3.1.tgz \
  #   --set global.accept_eula=true \
  #   --set global.storage_backend_type=s3 \
  #   --set global.s3.bucket_name=<S3 bucket name> \
  #   --set global.s3.region_name=<S3 bucket region>  \
  #   --set api-gateway.image.pullSecrets={nvcr.io} \
  #   --set global.imagePullSecrets={nvcr.io}
  # ```
  #
  s3:
    # --
    # @raw
    #
    # S3 bucket name
    bucket_name:
    # --
    # @raw
    #
    # S3 bucket region name
    region_name:
    # --
    # @raw
    #
    # Allow services to write to the USD Search API system location on the S3
    # bucket
    allow_system_writes: true
    # --
    # @raw
    #
    # Allow services to write to any other location on the S3 bucket
    allow_non_system_writes: true
    # --
    # @raw
    #
    # It is possible to specify a custom endpoint to be able to work with different data providers that
    # expose S3 interface. If it is not specified, it will use the default AWS S3 endpoint.
    aws_endpoint_url:
    # --
    # @raw
    #
    # Name of the secret for storing AWS authentication information.
    #
    # Leave this variable unset if no authentication is required for accessing
    # data on the S3 bucket (e.g., if the S3 bucket is public or if access is
    # implicitly granted and does not require explicit credentials.)
    #
    # In case ``storage_backend_type`` is set to ``s3`` and authentication is
    # needed for accessing data stored on the provided S3 bucket, it is
    # required to create a Kubernetes secret with the following two keys:
    #
    #   * AWS_ACCESS_KEY_ID
    #   * AWS_SECRET_ACCESS_KEY
    #
    # The secret can be created by running the following command:
    #
    # ```
    # kubectl create secret generic deepsearch-s3-credentials --from-literal=AWS_ACCESS_KEY_ID=... --from-literal=AWS_SECRET_ACCESS_KEY=...
    # ```
    #
    # __NOTE__: If you see an error message like "SignatureDoesNotMatch", check if special characters in the secret are
    # escaped properly.
    #
    # check if s3proxy is set otherwise this is not needed
    aws_credentials_secret_name: deepsearch-s3-credentials

    # --
    # @raw
    #
    # It is possible to provide the aws_endpoint_url as parameters in order to
    # make the kubernetes secret with authentication information created on startup.
    authentication_enabled: true

    # --
    # @raw
    #
    # It is possible to provide the aws_access_key_id as parameters in order to
    # make the kubernetes secret with authentication information created on startup.
    aws_access_key_id:

    # --
    # @raw
    #
    # It is possible to provide the aws_secret_access_key as parameters in order
    # to make the kubernetes secret with authentication information created on startup.
    aws_secret_access_key:

    # --
    # @raw
    #
    # Number of seconds before the next S3 bucket indexing will be triggered
    re_scan_timeout: "86400"

  ################################################################################
  ## Omniverse Storage API configuration
  ################################################################################

  # --
  # @raw
  #
  # To deploy the USD Search Helm chart and connect it to an Omniverse Storage API for
  # indexing, run the following command:
  #
  #```bash
  # helm install <deployment name> usdsearch-1.3.1.tgz \
  #   --set global.accept_eula=true \
  #   --set global.storage_backend_type=storage_api \
  #   --set global.storage_api.grpc_endpoint=<Storage API gRPC endpoint> \
  #   --set global.storage_api.base_uri=<Storage API base URI> \
  #   --set global.secrets.create.registry=true \
  #   --set api-gateway.image.pullSecrets={nvcr.io} \
  #   --set global.imagePullSecrets={nvcr.io}
  #```
  #
  # __NOTE__: Please refer to [Omniverse Storage API documentation](https://catalog.ngc.nvidia.com/orgs/nvidia/teams/omniverse/collections/storage_apis) for more information about the Storage API.
  #
  # ### SSL support
  #
  # If the Storage API is configured to use SSL, set this to true.
  # This is used to enable SSL for the Storage API connection.
  #
  # ```bash
  #   --set global.storage_api.ssl=true
  # ```
  #
  # ### Authentication
  #
  # If Omniverse Storage APIs are configured to use authentication, it is possible to authenticate with the Storage API using either a token or OpenID. To do so, please set the following parameters:
  #   * authentication.enabled=true
  #   * authentication.type=token or authentication.type=openid
  #   * authentication.token=<Storage API token>
  #   * authentication.openid.token_url=<OpenID token URL>
  #   * authentication.openid.client_id=<OpenID client ID>
  #   * authentication.openid.client_secret=<OpenID client secret>
  #
  # it is then required to add the following command line arguments during helm chart deployment for token authentication:
  # ```bash
  #   --set global.secrets.create.auth=true
  #   --set global.storage_api.authentication.enabled=true \
  #   --set global.storage_api.authentication.type=token \
  #   --set global.storage_api.authentication.token=<Storage API token> \
  #   --set global.secrets.create.auth=true \
  # ```
  # and for OpenID authentication:
  # ```bash
  #   --set global.secrets.create.auth=true
  #   --set global.storage_api.authentication.enabled=true \
  #   --set global.storage_api.authentication.type=openid \
  #   --set global.storage_api.authentication.openid.token_url=<OpenID token URL> \
  #   --set global.storage_api.authentication.openid.client_id=<OpenID client ID> \
  #   --set global.storage_api.authentication.openid.client_secret=<OpenID client secret> \
  # ```
  #
  # ### Thumbnail retrieval
  #
  # When using the Storage API backend, thumbnails are not resolved from the filesystem (the ``deepsearch.thumbnail_settings`` configuration does not apply). Instead, the service reads the thumbnail URL directly from a field in the asset's metadata.
  #
  # By default the field named ``thumbnail_url`` is used. You can override this with an ordered list of field names; the first field present in the asset metadata whose value is a non-empty string is used as the thumbnail URL:
  #
  # ```bash
  #   --set global.storage_api.thumbnail_metadata_fields[0]=thumbnail_url
  # ```
  #
  # or via a values file:
  #
  # ```yaml
  # global:
  #   storage_api:
  #     thumbnail_metadata_fields:
  #       - thumbnail_url
  # ```
  #
  # ### Alternative installation options
  #
  # The above command creates all required secrets on helm chart deployment,
  # which is done for convenience. It may, however, be not acceptable in some
  # deployment scenarios to pass credential information through helm chart
  # values. To address this issue it is possible to create kubernetes secret
  # with access information manually with the following command:
  #
  # ```bash
  # kubectl create secret generic deepsearch-storage-api-credentials \
  #   --from-literal=token=<Storage API token>
  # ```
  #
  # Similarly, it is possible to create a registry access secret with the
  # following command:
  #
  # ```bash
  # kubectl create secret docker-registry nvcr.io \
  #   --docker-server=nvcr.io \
  #   --docker-username='$oauthtoken' \
  #   --docker-password=<NGC API KEY> \
  #   --docker-email=<your-email>
  # ```
  #
  # With the above secrets created, the helm chart installation command can be
  # simplified to:
  #
  # ```bash
  # helm install <deployment name> usdsearch-1.3.1.tgz \
  #   --set global.accept_eula=true \
  #   --set global.storage_backend_type=storage_api \
  #   --set global.storage_api.grpc_endpoint=<Storage API gRPC endpoint> \
  #   --set global.storage_api.base_uri=<Storage API base URI> \
  #   --set global.storage_api.ssl=true \
  #   --set global.storage_api.authentication.enabled=true \
  #   --set global.storage_api.authentication.type=token \
  #   --set global.storage_api.authentication.secret_name=storage-api-credentials \
  #   --set global.storage_api.authentication.token=<Storage API token> \
  #   --set api-gateway.image.pullSecrets={nvcr.io} \
  #   --set global.imagePullSecrets={nvcr.io}
  # ```
  #
  storage_api:
    #
    # Storage API backend type
    backend_type: storage_api

    # -- (string)
    # @raw
    #
    # Storage API gRPC endpoint that points to the Storage API service
    grpc_endpoint:

    # Notifications API grpc endpoint
    # if not set, main grpc endpoint is used
    notifications_grpc_endpoint:

    # -- (string)
    # @raw
    #
    # Base URI of the Storage API. This should be the URL of the bucket / blob
    # store or other entity that is exposed through the Storage API.
    #
    # Example:
    #  * for an Azure blob store container it could be: ``https://my-account.blob.core.windows.net/my-container``
    #  * for an S3 bucket it could be something like ``https://my-bucket.s3.us-east-1.amazonaws.com``
    #  * for a Google Cloud Storage bucket it could be something like ``https://my-bucket.storage.googleapis.com``
    #  * for a local file system it could be something like ``file-storage://fileservice`` (depending on your Storage API configuration)
    #
    base_uri:

    # -- (bool)
    # @raw
    #
    # Enable subscription to notifications from the Storage API.
    # This is used to subscribe to notifications from the Storage API and process them in real-time.
    notification_subscription_enabled: false

    # -- (bool)
    # @raw
    #
    # If GRPC endpoint is using SSL, set this to true.
    # This is used to enable SSL for the Storage API connection.
    ssl: false

    # -- (map)
    # @raw
    #
    # Authentication configuration.
    # Could be token or openid.
    #
    # If using token authentication, the following parameters are required:
    #   * token - the token to use for authentication
    #   * secret_name - the name of the secret that stores the token
    #   * secret_key - the key in the secret that stores the token
    #
    # If using openid authentication, the following parameters are required:
    #   * token_url - the URL of the OpenID token endpoint
    authentication:
      enabled: false
      type: token
      secret_name: storage-api-credentials
      token:
      secret_key: token
      openid:
        token_url:
        grant_type: client_credentials
        client_id:
        client_id_secret_key: "client_id"
        client_secret:
        client_secret_secret_key: "client_secret"
        scope:
        scope_secret_key: "scope"

    #
    # @raw
    #
    # By default USD Search relies on FileFolder API if it is available. In some cases,
    # it may be desirable to ignore the FileFolder API and use purely FileObject API instead.
    # This can be achieved by setting the following parameter to ``true``.
    #
    ignore_filefolder_api: false

    # -- (string)
    # @raw
    #
    # Number of seconds before the next full Storage API re-scan will be
    # triggered by the storage client. Controlled by the
    # ``STORAGE_API_RE_SCAN_TIMEOUT`` environment variable. Set to ``-1`` (or
    # any non-positive value) to disable periodic re-scans.
    re_scan_timeout: "86400"

    # -- (list)
    # @raw
    #
    # When using the Storage API backend, thumbnails are not resolved from the filesystem. Instead, the service reads the thumbnail URL directly from the asset's metadata fields. This setting specifies the ordered list of metadata field names to inspect: the first field present in the asset metadata whose value is a non-empty string is used as the thumbnail URL.
    #
    # Controlled by the ``STORAGE_API_THUMBNAIL_METADATA_FIELDS`` environment variable.
    #
    # Example — use a custom metadata field named ``preview_url``:
    #
    # ```yaml
    # global:
    #   storage_api:
    #     thumbnail_metadata_fields:
    #       - preview_url
    # ```
    #
    # @notationType -- yaml
    thumbnail_metadata_fields:
      - thumbnail_url

  ################################################################################
  ## Search Backend Settings
  ################################################################################

  # -- (map)
  # @raw
  #
  # By default an instance of OpenSearch is deployed as part of the USD Search API
  # helm chart. The following parameters can be set to configure the search backend:
  #  * ``index_name`` - name of the search index prefix (default: ``my-usdsearch-instance-index``). In practice there will be 2 indexes created in the Search Backend (OpenSearch):
  #    * ``<index_name>-ver5.0`` - stores embedding data and is the main index, where search is being executed
  #    * ``<index_name>-ver4.0-image-cache`` - non-indexed data storage for assets' renderings.
  #  * ``number_of_shards`` - number of shards of search indices (default: ``3``). Please refer to [OpenSearch documentation](https://opensearch.org/blog/optimize-opensearch-index-shard-size/) for more information about the number of shards selection.
  #
  #    __NOTE__: The ``number_of_shards`` value can only be set during the first installation of the USD Search API helm chart. If the index is already created on the OpenSearch instance - changing this parameter in the helm chart would have no effect. In order to modify this parameter after installation, you need to create a new OpenSearch index with the correct amount of shards and apply re-indexing as described in [OpenSearch documentation](https://opensearch.org/blog/optimize-opensearch-index-shard-size/).
  #
  # ### External OpenSearch instance
  #
  # If you wish to rely on your own instance of OpenSearch (external to the USD Search API helm chart), you can do the following:
  # * disable creation of the default OpenSearch instance by setting the following command line argument during helm chart deployment:
  # ```bash
  #   --set opensearch_deployment.enabled=false
  # ```
  #
  # * set the following parameters:
  #   * ``host`` - hostname of the OpenSearch instance (default: ``deepsearch-opensearch-cluster-master``)
  #   * ``port`` - port of the OpenSearch instance (default: ``9200``)
  #   * ``schema`` - schema of the OpenSearch instance (default: ``http``)
  #   * ``use_ssl`` - whether to use SSL for the OpenSearch instance (default: ``false``)
  #   * ``auth_secret_name`` - name of the secret that stores the authentication information for the OpenSearch instance. Please refer to [OpenSearch authentication](#opensearch-authentication) section for more information.
  #   * ``hosts`` - comma-separated list of additional OpenSearch instances to use for search (default: ``[]``)
  #
  # @notationType -- yaml
  search_backend_config:
    backend_type: os_index

    # --
    # @raw
    #
    # Name of the search index.
    #
    # In practice there will be 3 indexes created in the Search Backend (Elastic
    # Search or OpenSearch):
    #
    #  * ``{{ .index_name }}-ver5.0`` - stores embedding data and is
    #    the main index, where search is being executed
    #  * ``{{ .index_name }}-ver4.0-image-cache`` - non-indexed data
    #    storage for assets' renderings.
    #  * ``{{ .index_name }}-ver4.0-pointcloud-cache`` - non-indexed
    #    data storage for assets' pointcloud data. This index is not used by
    #    default, but is created for compatibility purposes.
    index_name: my-usdsearch-instance-index

    # --
    # @raw
    #
    # Number of shards of search indices.
    #
    # __NOTE__: The value can only be set during the installation.
    #
    number_of_shards: 3

    # --
    # @raw
    #
    # ``HOST`` of the OpenSearch instance. If using the included OpenSearch
    # instance, keep the default values.
    host: deepsearch-opensearch-cluster-master

    # --
    # @raw
    #
    # ``PORT`` of the OpenSearch instance. If using the included OpenSearch
    # instance, keep the default values.
    port: 9200

    # --
    # @raw
    #
    # ``SCHEMA`` of the OpenSearch instance. If using the included OpenSearch
    # instance, keep the default values.
    schema: http

    use_ssl: false

    # --
    # @raw
    #
    # In order to authenticate with OpenSearch cluster a kubernetes secret that stores a subset of the following parameters can be created:
    #  * username
    #  * password
    #
    # The name of the secret can be specified by providing the following command line argument during helm chart deployment:
    # ```bash
    #   --set global.search_backend_config.auth_secret_name=<secret-name>
    # ```
    # Please refer to [OpenSearch authentication](https://docs.opensearch.org/docs/latest/security/authentication-backends/authc-index/) for more information about different authentication possibilities within OpenSearch. If any of these parameters are not required for the chosen authentication method, they don't need to be set within a secret.
    #
    # __NOTE__: By default there is no authentication enabled on the test OpenSearch instance that can be deployed with the USD Search API helm chart. Therefore, when using the test installation a secret with these parameters does not need to be created and the following variable can be left unchanged. Authentication on the test OpenSearch instance can be enabled if one needs it, as the test OpenSearch endpoint is exposed on the internal k8s network, so if there are other services running in the cluster they can also access it.
    #
    auth_secret_name:

    # Additional search backend hosts can be provided by passing a
    # comma-separated list of values in the following variable. If this
    # functionality is not need - leave this value commented out

    # hosts:

    # --
    # @raw
    #
    # Maximum chunk size for bulk insert operations (in bytes).
    # If the parameter is unset, then the default value that is configured on the service side
    # will be used.
    max_chunk_size:

    # --
    # @raw
    #
    # Serializer used for OpenSearch request/response payloads.
    # Supported values: ``orjson``, ``json``.
    #
    # ``orjson`` is significantly faster than the standard ``json`` serializer
    # and is the recommended default. Switch to ``json`` only if compatibility
    # issues arise with a specific OpenSearch version or client.
    serializer: orjson

  ################################################################################
  ## Indexing configuration parameters
  ################################################################################

  # --
  # @raw
  #
  # It is possible to exclude some file name patterns from processing. In order
  # to do so please update the following variable. The syntax of this variable
  # should follow the following pattern:
  #
  # ```yaml
  # exclude_patterns:
  # - "regex 1"
  # - "regex 2"
  # ```
  # Here ``regex 1`` and ``regex 2`` are some regular expressions that can be found in
  # a file path. For example the following values:
  #
  # ```yaml
  # exclude_patterns:
  # - "/.thumbs/"
  # - ".__omni_channel__"
  # ```
  # will filter out all items that are within ``.thumbs`` folders and all those
  # assets that contain ``__omni_channel__`` in the file path
  exclude_patterns:
  - /.thumbs/
  - .__omni_channel__


  ################################################################################
  ## Logging configuration
  ################################################################################

  # --
  # Enable structured logging that could then be collected from container
  # standard output and forward to any system for keeping log data
  #
  enable_structured_logging: false

  ################################################################################
  ## Registry for containers
  ################################################################################

  # --
  # @raw
  #
  # Container Registry root URL
  registry: nvcr.io/nvidia/usdsearch

  # -- (map)
  # @raw
  #
  # Unified container images for the USD Search stack. Every Helm-deployed pod
  # runs one of three images published from this repo on each `images-X.Y.Z`
  # tag at ``{{ global.registry }}/<repository>:<tag>``:
  #
  #  * ``usdsearch`` — combined Python image (deepsearch-api, info-endpoint,
  #    monitor / plugin workers, asset-graph-service, deepsearch-crawler,
  #    ngsearch indexers, ...).
  #  * ``siglip2_triton`` — Triton Inference Server with the SigLIP2 ONNX
  #    model bundled.
  #  * ``rendering_job`` — GPU-accelerated Omniverse Kit image. Reused for the
  #    asset-graph-builder sidecar via ``MODE=graph-builder``.
  #
  # The ``tag`` defaults to the chart ``appVersion`` (set on each
  # ``images-X.Y.Z`` release). Per-service ``image.{name,tag}`` values still
  # take precedence when set, so existing overrides keep working.
  #
  # @notationType -- yaml
  image:
    pullPolicy: IfNotPresent
    usdsearch:
      repository: usdsearch
      tag: ""
    siglip2_triton:
      repository: siglip2-triton
      tag: ""
    rendering_job:
      repository: usdsearch-kit-workflows
      tag: ""

  # -- (string)
  # @raw
  #
  # Default tag for the unified container images defined in ``global.image``.
  # Defaults to the latest published image set so local installs pull real
  # tags from NGC. CI overrides this at chart-package time from the latest
  # ``images-X.Y.Z`` tag (same value as the chart ``appVersion``). Per-image
  # ``global.image.<name>.tag`` overrides take precedence; this field is the
  # shared fallback so all three unified images track the same release by
  # default.
  appVersion: "1.3.1"

  # -- (map)
  # @raw
  #
  # Kubernetes secret that stores authentication information for pulling images
  # from the registry.
  # @notationType -- yaml
  imagePullSecrets:
  #- name: nvcr.io

  # -- (string)
  # @raw
  #
  # As an alternative to the ``imagePullSecrets`` field, it is possible to
  # provide the name for the docker container secret.
  ngcImagePullSecretName: "nvcr.io"

  # -- (string)
  # @raw
  #
  # It is possible to provide NGC API Key on the first deployment of the helm
  # chart, such that the appropriate docker registry pull secret is created.
  ngcAPIKey:

  # -- (string)
  # @raw
  #
  # It is possible to provide NGC API Key on the first deployment of the helm
  # chart, such that the appropriate docker registry pull secret is created.
  ngcAPIKeySecretName: ngc-api

  # -- (map)
  # @raw
  #
  # Additional optional DNS configuration parameters can be passed using the
  # following parameter:
  # @notationType -- yaml
  dnsConfig:
    searches: []

  ################################################################################
  ## Global secrets settings
  ################################################################################

  # --
  # @raw
  #
  # Auto-generated secrets configuration. By setting the respective field in the
  # ``create`` section to ``true`` it is possible to create authentication and
  # container registry secrets on helm chart deployment.
  secrets:
    create:
      auth: false
      registry: false
      ngc_api: false
      vlm: false
      embedding: false
      explorer_ui: false
      rendering_service: false
    annotations:
      helm.sh/resource-policy: keep


  ################################################################################
  ## Global checks settings
  ################################################################################

  # --
  # @raw
  #
  # Configuration of helm hooks that are used for testing storage backend
  # availability and API readiness.
  checks:
    storage_backend:
      enabled: true
      backoff_limit: 5
      annotations:
        helm.sh/hook: pre-install,test
        helm.sh/hook-weight: "0"
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
      s3_proxy_annotations:
        helm.sh/hook: test
        helm.sh/hook-weight: "0"
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    ags:
      enabled: true
      backoff_limit: 5
      annotations:
        helm.sh/hook: test
        helm.sh/hook-weight: "0"
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    rest_api:
      enabled: true
      backoff_limit: 5
      annotations:
        helm.sh/hook: test
        helm.sh/hook-weight: "0"
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    embedding:
      enabled: true
      backoff_limit: 5
      annotations:
        helm.sh/hook: test
        helm.sh/hook-weight: "0"
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    explorer_ui:
      enabled: true
      backoff_limit: 5
      annotations:
        helm.sh/hook: test
        helm.sh/hook-weight: "0"
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    rendering_service:
      enabled: true
      backoff_limit: 5
      annotations:
        helm.sh/hook: test
        helm.sh/hook-weight: "0"
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded

# --
# @raw
#
# Maintenance mode disables all background indexing services while keeping the
# API and databases operational.
#
# This mode is useful when you want to perform maintenance on the system (e.g.
# resizing / clean-up of redis, opensearch, etc.)
#
# @notationType -- yaml
maintenance:
  enable: false

# Configuration for the default Redis cluster, which gets deployed when
# redis_deployment.enabled is set to True.
redis:
  # --
  # @raw
  #
  # Redis architecture type
  architecture: standalone
  # -- (map)
  # @raw
  #
  # Redis authentication
  # @notationType -- yaml
  auth:
    enabled: False
  # -- (map)
  # @raw
  #
  # Redis master configuration
  # @notationType -- yaml
  master:
    disableCommands: []
    persistence:
      enabled: True
      size: 64Gi
    resources:
      limits:
        memory: 10Gi
        ephemeral-storage: 2Gi
        cpu: 1000m

  # -- (map)
  # @raw
  #
  # Redis additional replica count
  # @notationType -- yaml
  replica:
    replicaCount: 0
  # -- (tpl/array)
  # @raw
  #
  # Redis common configuration
  # @notationType -- tpl
  commonConfiguration: |-
    appendonly yes
    save ""
    databases 32

  # Due to bitnami restructuring of container the following parameters are required to be set
  image:
    repository: bitnamilegacy/redis

opensearch:
  # --
  # @raw
  #
  # Default opensearch cluster name
  clusterName: "deepsearch-opensearch-cluster"
  # --
  # @raw
  #
  # Default number of OpenSearch replicas.
  #
  # The larger is the number of replicas - the higher is availability of the
  # service (that is more search requests can be processed in parallel) however,
  # as a drawback - more resources will be occupied.
  replicas: 3
    # --
  # @raw
  #
  #  Default opensearch master service name
  masterService: "deepsearch-opensearch-cluster-master"
  # --
  # @raw
  #
  #  Default opensearch Java options
  opensearchJavaOpts: "-Xmx4096M -Xms4096M"
  # -- (map)
  # @raw
  #
  # Default opensearch resource requests per replica
  # @notationType -- yaml
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "3"
      memory: "8Gi"
  # -- (map)
  # @raw
  #
  # Default opensearch persistent configuration
  # @notationType -- yaml
  persistence:
    enabled: true
    size: 100Gi
  config:
    # -- (tpl/array)
    # @raw
    #
    # Default opensearch deployment configuration
    # @notationType -- tpl
    opensearch.yml: |
      network.host: 0.0.0.0
      #knn.algo_param.index_thread_qty: 8
      plugins:
        security:
          disabled: true
  extraEnvs:
  - name: DISABLE_INSTALL_DEMO_CONFIG
    value: "true"

  # -- (map)
  # @raw
  #
  # Set optimal sysctl's through securityContext. This requires privilege. Can be disabled if
  # the system has already been pre-configured. (Ex: https://www.elastic.co/guide/en/elasticsearch/reference/current/vm-max-map-count.html)
  # Also see: https://kubernetes.io/docs/tasks/administer-cluster/sysctl-cluster/
  # @notationType -- yaml
  sysctl:
    enabled: false

  # -- (map)
  # @raw
  #
  # Set optimal sysctl's through privileged initContainer.
  sysctlInit:
    enabled: false

opensearch-dashboards:
  config:
    opensearch_dashboards.yml: |
     server.name: dashboards
     server.host: "0.0.0.0"
     server.ssl.enabled: false
     opensearch.ssl.verificationMode: none
     opensearch.username: kibanaserver
     opensearch.password: kibanaserver
     opensearch.requestHeadersWhitelist: [authorization, securitytenant]
     opensearch.hosts: ["http://deepsearch-opensearch-cluster-master:9200"]
#  plugins:
#    enabled: "true"
#    installList:
#      # hacky way to change the default container command
#      - "'' || true; /usr/share/opensearch-dashboards/bin/opensearch-dashboards-plugin remove securityDashboards"
  extraEnvs:
    - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
      value: "true"
  opensearchHosts: "http://deepsearch-opensearch-cluster-master:9200"
  ingress:
    enabled: false
    ingressClassName: nginx
    annotations: { }
    labels: { }
    hosts:
      - host: ""
        paths:
          - path: /
            backend:
              serviceName: ""
              servicePort: ""

# DeepSearch services stack configuration
deepsearch:
  #
  # It is possible to override the global exclude_patterns setting for DeepSearch
  # service specifically. In order to do so please update the following variable.
  # The syntax of this variable should follow the same pattern as in exclude_patterns:
  #
  #  exclude_patterns:
  #  - /.thumbs/
  #  - .__omni_channel__
  #

  # -- (map)
  # @raw
  #
  # (Beta) Vision Language Model (VLM) configuration functionality settings
  #
  vision_endpoint:
    # --
    # @raw
    #
    # Vision endpoint allows to automatically tag and caption various assets stored on the storage backend using an external Vision Language Model (VLM) service.
    #
    # The following types of VLM services providers could be configured with the helm chart:
    #   * azure_openai
    #   * openai
    #   * anthropic
    #   * mistralai
    #   * google
    #   * nim
    #   * qwen
    #   * inference_hub
    #
    # In order to select one VLM for the whole service globally you can pass the following command line parameter:
    #
    # ```bash
    #     --set deepsearch.vision_endpoint.vlm_service=<VLM service provider>
    # ```
    #
    # or specify `deepsearch.vision_endpoint.vlm_service` setting in the `my-usdsearch-config.yaml` file as follows:
    #
    # ```yaml
    # deepsearch:
    #   vision_endpoint:
    #     vlm_service: <VLM service provider>
    #  ```
    #
    # __NOTE__: This setting can be overwritten for any USD Search API plugin (e.g. ``rendering_to_vision_metadata`` plugin) by passing the following command line arguments:
    # ```bash
    #     --set deepsearch.plugins.rendering_to_vision_metadata.vision_endpoint.vlm_service=<VLM service provider>
    # ```
    #
    # Alternatively, for each plugin your can provide respective setting in the `my-usdsearch-config.yaml` file as follows:
    #
    # ```yaml
    # deepsearch:
    #   plugins:
    #     rendering_to_vision_metadata:
    #       vision_endpoint:
    #         vlm_service: <VLM service provider>
    #  ```
    #
    # If no ``vision_endpoint`` setting is provided for the plugin, the global VLM configuration will be used.
    #
    # For more information about the available USD Search API plugins, please refer to [Plugin Settings section](#plugin-settings).
    #
    vlm_service: ""
    # --
    # @raw
    #
    # Azure OpenAI VLM endpoint configuration.
    #
    # It is required to provide a secret with the API key for accessing Azure OpenAI service, which could be done with the following command:
    # ```bash
    # kubectl create secret generic azure-openai-vlm-api-key-secret \
    #     --from-literal=api-key=<Azure OpenAI API Key>
    # ```
    #
    # Alternatively, if such secret is not created in advance it is possible to automatically by providing the following command line arguments during the first helm installation:
    # ```bash
    #     --set global.secrets.create.vlm=true \
    #     --set deepsearch.vision_endpoint.azure_openai.api_key=<Azure OpenAI API Key>
    # ```
    #
    # If it possible to customize various parameters of the Azure OpenAI VLM endpoint. This can be done using the following command line arguments:
    #
    # ```bash
    #     --set deepsearch.vision_endpoint.azure_openai.parameters.<parameter name>=<parameter value>
    # ```
    #
    # The full list of parameters with pre-set default values can be found below:
    azure_openai:
      api_key_secret_name: "azure-openai-vlm-api-key-secret"
      api_key_secret_field: "api-key"
      api_key: ""
      env_prefix: "AZURE_OPENAI_"
      # --
      #
      # Model parameters
      parameters:
        model: gpt-4o-20241120
        api_version: 2025-03-01-preview
        azure_endpoint:
        max_tokens: 2048
        temperature: 0
        azure_deployment: gpt-4o-20241120
    # --
    # @raw
    #
    # OpenAI VLM endpoint configuration.
    #
    # It is required to provide a secret with the API key for accessing OpenAI service, which could be done with the following command:
    # ```bash
    # kubectl create secret generic openai-vlm-api-key-secret \
    #     --from-literal=api-key=<OpenAI API Key>
    # ```
    #
    # Alternatively, if such secret is not created in advance it is possible to automatically by providing the following command line arguments during the first helm installation:
    # ```bash
    #     --set global.secrets.create.vlm=true \
    #     --set deepsearch.vision_endpoint.openai.api_key=<OpenAI API Key>
    # ```
    #
    # __NOTE__: Instead of relying on the OpenAI model, it is possible to provide on a custom VLM model endpoint, provided this custom VLM model has OpenAI API compatible interface. This could be achieved by appropriately setting the ``base_url`` parameter:
