        # ```
        #
        # @notationType -- yaml
        qwen:
          api_key_secret_name: "qwen-vlm-api-key-secret"
          api_key_secret_field: "api-key"
          api_key: ""
          env_prefix: "QWEN_"
          parameters:
            model: "qwen3-vl-235b-a22b-instruct"
            max_tokens: 4096
            temperature: 0
        # --
        # @raw
        #
        # Inference Hub VLM endpoint configuration.
        #
        # It is required to provide a secret with the API key for accessing Inference Hub service, which could be done with the following command:
        # ```bash
        # kubectl create secret generic inference-hub-vlm-api-key-secret \
        #     --from-literal=api-key=<Inference Hub API Key>
        # ```
        #
        # Alternatively, if such secret is not created in advance it is possible to automatically by providing the following command line arguments during the first helm installation:
        # ```bash
        #     --set global.secrets.create.vlm=true \
        #     --set ngsearch.microservices.search_rest_api.validation.vlm_service.inference_hub.api_key=<Inference Hub API Key>
        # ```
        #
        # If it possible to customize various parameters of the Inference Hub VLM endpoint. This can be done using the following command line arguments:
        #
        # ```bash
        #     --set ngsearch.microservices.search_rest_api.validation.vlm_service.inference_hub.parameters.<parameter name>=<parameter value>
        # ```
        #
        # The full list of parameters with pre-set default values can be found below:
        #   * model
        #   * max_tokens
        #   * temperature
        #
        # For example, it is possible to customize the model parameter as follows:
        # ```bash
        #     --set ngsearch.microservices.search_rest_api.validation.vlm_service.inference_hub.parameters.model=gcp/google/gemini-3-flash-preview
        # ```
        #
        # @notationType -- yaml
        inference_hub:
          api_key_secret_name: "inference-hub-vlm-api-key-secret"
          api_key_secret_field: "api-key"
          api_key: ""
          env_prefix: "INFERENCE_HUB_"
          parameters:
            model: "azure/openai/gpt-5.1"
            max_tokens: 4096
            temperature: 0

        # Domain context to use for validation
        domain_context: |
          You are validating search results for a 3D asset search engine used by professional 3D artists and developers.

          ## Asset Types
          The assets being searched are 3D models (USD files) used in simulation, robotics, and visual effects. These include objects like vehicles, furniture, tools, food items, industrial equipment, architectural elements, nature elements, and characters.

          ## Thumbnail Limitations
          Reference images are rendered thumbnails of 3D assets. Keep in mind:
          - Colors may shift slightly between renderers — allow minor hue/saturation variance
          - Materials (wood, metal, plastic) may not be perfectly distinguishable at thumbnail resolution
          - A single thumbnail may not capture all parts of a complex asset — do not penalize for occluded geometry
          - Lighting and background vary per render; do not factor these into your decision

          ## Match Decision Guidelines

          **is_match = true** when the asset is something a user searching for this query would reasonably want in their results. Apply these principles:

          1. **Semantic match over literal match**: "office chair" matches an ergonomic desk chair even if the word "office" doesn't appear anywhere. Think about what a 3D artist searching this term actually wants.
          2. **Supertype queries are inclusive**: A query for "vehicle" should match cars, trucks, motorcycles. A query for "furniture" should match chairs, tables, shelves.
          3. **Subtype queries are exclusive**: A query for "sedan" should NOT match an SUV. A query for "bar stool" should NOT match a dining chair.
          4. **Attribute queries must be verified**: If the query specifies color, material, or style, the asset must visibly exhibit that attribute. "Red car" must show a red car, not a blue one.
          5. **Partial overlap is not enough**: The query's primary subject must match the asset's primary subject. Incidental or background objects don't count.

          **is_match = false** when:
          - The asset is a fundamentally different object than what was queried
          - A specified attribute (color, material, type) clearly contradicts what's visible
          - The query names a specific item and the asset is a different item in the same broad category (e.g., "lemon" vs "lime", "screwdriver" vs "wrench")

          **When both a query image AND text query are provided**: The text query takes priority over the image for validation. The text reflects the user's explicit intent:
          - If the text specifies attributes like color or material (e.g., "red forklift"), the reference asset **must** match those attributes to be considered a match, even if the geometry matches the query image.
          - The query image provides shape/category context, but the text query's specific attributes are the deciding factor.
          - A geometrically identical asset with a different color than specified in the text query is **not a match**.

          **When uncertain**: If similarity_score is 65 or higher and you cannot find clear disqualifying evidence, lean toward is_match = true. A borderline relevant result is better than a missed relevant one.

          ## Scoring Precision
          - Use the full 0–100 range. Don't cluster scores around 50 or 80.
          - An exact object-type match with wrong color (e.g., "red car" → blue car) should score 40–55, not 0–20. The object type is correct; only the attribute is wrong.
          - A correct object with all attributes matching should score 85+.
          - A completely unrelated object should score below 20.


