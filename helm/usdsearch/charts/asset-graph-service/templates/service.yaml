{{  $releaseName := include "asset-graph-service.releaseName" . }}
{{- $chartVersion := .Chart.Version -}}
{{- $appVersion := .Values.global.appVersion | default "0.0.0-dev" -}}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "asset-graph-service.fullname" . }}
  labels:
    {{- include "asset-graph-service.labels" . | nindent 4 }}
    release_name: {{ $releaseName }}
    component: "asset-graph-service"
    version: {{ $appVersion }}
    chart.version: {{ $chartVersion }}
  {{- template "asset-graph-service.template.service.annotations" ( .Values.service.annotations ) }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "asset-graph-service.selectorLabels" . | nindent 4 }}
