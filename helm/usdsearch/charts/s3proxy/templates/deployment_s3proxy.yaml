{{  $fullName := include "s3proxy.fullname" . -}}

{{- if .Values.global.s3proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "s3proxy.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "s3proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "s3proxy.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: s3proxy
        image: {{ .Values.image.url }}
        ports:
        - containerPort: 80
        env:
        - name: JAVA_OPTS
          value: {{ .Values.extraJavaOpts | default "" }}
        - name: S3PROXY_AUTHORIZATION
          value: {{ .Values.authorization | default "none" }}
        - name: S3PROXY_ENDPOINT
          value: "http://0.0.0.0:80"
        - name: JCLOUDS_PROVIDER
          value: {{ .Values.jclouds.provider }}
        - name: JCLOUDS_IDENTITY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.jclouds.secret_name | default "s3proxy-credentials" }}
              key: {{ .Values.jclouds.identity_key | default "jclouds-identity" }}
        - name: JCLOUDS_CREDENTIAL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.jclouds.secret_name | default "s3proxy-credentials" }}
              key: {{ .Values.jclouds.credential_key | default "jclouds-credential" }}
        - name: JCLOUDS_ENDPOINT
          value: {{ .Values.jclouds.endpoint }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
          {{- toYaml .Values.volumeMounts | nindent 12 }}
      volumes:
        {{- toYaml .Values.volumes | nindent 8 }}
{{- end }}
