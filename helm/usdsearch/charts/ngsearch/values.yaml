################################################################################
## NGSearch services config
################################################################################

# Name of kubernetes secret that stores information about the service
# account that is used to access data in Nucleus.

# Please refer to https://docs.omniverse.nvidia.com/nucleus/deepsearch
# for more information on how such kubernetes secrets can be created.

################################################################################
## Indexing configuration parameters
################################################################################

# It is possible to override the global exclude_patterns setting for NGSearch
# service specifically. In order to do so please update the following variable.
# The syntax of this variable should follow the same pattern as in exclude_patterns:
#
# exclude_patterns:
# - <regex 1>
# - <regex 2>
#
# Here regex 1 and regex 2 are some regular expressions that can be found in
# a file path. For example the following value:
#
# exclude_patterns:
# - /.thumbs/
# - .__omni_channel__
#
# will filter out all items that are within ".thumbs" folders and all those
# assets that contain "__omni_channel__" in the file path


microservices:
  # set-up search thin layer interface with elastic search

  search_rest_api:
    enabled: true

    # Custom annotations to add to the search-rest-api deployment pod template
    # podAnnotations: {}
    # podAnnotations:
    #   custom.example.com/key: "value"
    podAnnotations:
      prometheus.io/path: /metrics
      prometheus.io/port: "8000"
      prometheus.io/scrape: "true"

    # liveness probe configuration
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 5
    # readiness probe configuration
    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 5

    # liveness check container
    embeddingLivenessCheck:
      enabled: true
      resources:
        requests:
          cpu: 200m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

    replicas: 1
    # By default the search REST API runs the unified `usdsearch` image
    # (see `global.image.usdsearch`). Override here to pin a different image
    # for the search REST API only.
    image:
      name: ""
      tag: ""

    # extra initContainers
    initContainers: []

    # it is possible to configure Admin Access to key to be able to see search
    # results without Nucleus Authentication token
    admin_authentication:
      enabled: true
      access_key:

    ################################################################################
    ## Search configuration parameters
    ################################################################################

    # Number of search results that are returned by the NGSearch Search Service by
    # default, when using non-paginated search functionality. This value can be
    # overridden from the input search query using the "max" prefix.

    default_search_size: 64

    ################################################################################
    ## Asset download bundler
    ################################################################################

    # Tunables for the /download/asset endpoint, which bundles an asset together
    # with all of its transitive dependencies (sublayers, references, textures)
    # into a single ZIP. Any value left null falls back to the service default,
    # so the whole block is optional.
    download:
      # Max transitive dependencies to pull from the asset graph for one bundle.
      # null = unlimited (default); set an integer to cap very large scenes.
      max_dependencies: null
      # Max dependency depth to traverse. null = unbounded (default).
      max_dependency_depth: null
      # Concurrent per-file downloads while assembling the ZIP (default 8).
      concurrency: null
      # Concurrent HEAD requests for the size-only (pre-flight) preview (default 16).
      size_check_concurrency: null
      # Max total bundle size in bytes. 0 = unlimited (default); a positive value
      # rejects oversized bundles with HTTP 413.
      max_bundle_bytes: null
      # Directory used to assemble the ZIP on disk. null = system default. On
      # Kubernetes, point this at a mounted emptyDir{medium: Memory} / tmpfs volume
      # to assemble in RAM without consuming the container's heap.
      temp_dir: null

    # In order to verify that client application has access to view certain assets
    # all search results are verified with the Storage backend. While this functionality
    # is crucial for Omniverse Nucleus servers with fine-grained access. It may
    # not be required for AWS S3 bucket or in the cases when all users have
    # access to all the assets on the storage backend. In that case it is
    # possible to switch off this functionality by setting the following parameter
    # to false, which would also decrease the time for processing search request.

    enable_access_verification: true

    ################################################################################
    ## Default Cut-off Threshold
    ################################################################################

    # Results returned by the search service have a score associated to them
    # that reflects how well the assets match the input query. In order to
    # avoid getting less relevant results, it is possible to filter out those
    # values, which score is lower than the predefined threshold. By default
    # the cutting off threshold is set at 0, which is the lowest possible score.

    default_cutoff_threshold: 0

    ################################################################################
    ## Search telemetry
    ################################################################################

    # NGSearch service has the possibility to gather telemetry information about
    # searches executed by the users of the system. This information can
    # then be used to understand what queries are most frequently executed and also
    # allow to track down issues, if some inconsistency appears in the search
    # results.
    #
    # Telemetry information includes:
    #
    #  * Overall duration of request processing
    #
    #  * Time spent waiting for response from Elastic Search service
    #
    #  * Parsed version of the input query that is then converted to a request to
    #    Elastic Search service
    #
    # Note that no information about the user is stored in the system.
    #
    # This telemetry is kept in memory by the service and, when stdout logging
    # is enabled (see below), emitted as structured logs. It is !>NOT<! sent
    # anywhere outside of the service.
    #
    # By default telemetry logging is switched off. If you wish to enable
    # it, set the parameter below to True

    use_search_telemetry: false

    # If Telemetry logging is enabled, there is additional possibility to log
    # telemetry information to stdout as structured logs, which can then accumulated
    # in a database for analysis. In order to enable this functionality, set the
    # following parameter to True.

    search_telemetry_stdout: false

    # validation of search results
    validation:
      # Enable validation of search results
      enabled: false
      # maximum number of concurrent requests to the VLM service
      max_concurrent_requests: 50
      # --
      # @raw
      #
      # Vision endpoint allows to automatically tag and caption various assets stored on the storage backend using an external Vision Language Model (VLM) service.
      #
      # All LLM/VLM access goes through ONE OpenAI-compatible provider (`provider.api_key` -> `USDSEARCH_LLM_API_KEY`, `provider.base_url` -> `USDSEARCH_LLM_BASE_URL`). The stack ships pointed at a default endpoint (NVIDIA Inference Hub); point `base_url` at any OpenAI-API-compatible server to use a different one.
      provider:
        api_key_secret_name: "usdsearch-llm-api-key-secret"
        api_key_secret_field: "api-key"
        api_key: ""
        env_prefix: "USDSEARCH_LLM_"
        base_url: "https://inference-api.nvidia.com"
      # Model used for per-result validation, on the provider above.
      model: "gcp/google/gemini-3.5-flash"

      # Domain context to use for validation
      domain_context: |
        You are validating search results for a 3D asset search engine used by professional 3D artists and developers.

        ## Asset Types
        The assets being searched are 3D models (USD files) used in simulation, robotics, and visual effects. These include objects like vehicles, furniture, tools, food items, industrial equipment, architectural elements, nature elements, and characters.

        ## Strictness Guidelines - BE VERY STRICT

        You must be significantly more strict when evaluating matches. A match should only be given when the asset clearly and specifically matches the query. Apply these stricter rules:

        ### Scoring Adjustments (override default ranges):
        - **is_match = true** ONLY when similarity_score is **75 or higher**
        - **is_match = false** when similarity_score is below 75
        - Do NOT give the benefit of the doubt. When uncertain, mark as NO MATCH.

        ### Strict Matching Rules:
        1. **Category matches are NOT enough**: If the query is "orange fruit" and the asset is a different fruit, that is NOT a match
        2. **Color specificity matters**: If the query mentions a color, the asset MUST show that color prominently
        3. **Object type must match precisely**: "chair" should only match chairs, not benches or stools
        4. **Generic terms require strong visual match**: Even for broad queries like "vehicle", the asset should clearly be a vehicle, not just transportation-related
        5. **Partial matches are NOT matches**: If the query describes a specific thing and the asset only partially matches, mark as NO MATCH
        6. **Contextual objects don't count**: If the query is "tree" and there's a tiny tree in the background of a building scene, that is NOT a match

        ### Examples of strict evaluation:
        - Query "red car" + Asset shows a blue car → NO MATCH (wrong color)
        - Query "office chair" + Asset shows a dining chair → NO MATCH (wrong type of chair)
        - Query "lime fruit" + Asset shows a lemon → NO MATCH (different fruit despite similar appearance)
        - Query "wooden table" + Asset shows a metal table → NO MATCH (wrong material)
        - Query "robot arm" + Asset shows a full humanoid robot → Could be a MATCH only if a robot arm is prominently visible

    # --
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 80
      targetMemoryUtilizationPercentage: 90

    # resources for the deployment
    resources:
      requests:
        cpu: 1
        memory: 1Gi
      limits:
        cpu: 2
        memory: 2Gi

    loggingConfig:
      version: 1
      disable_existing_loggers: False
      filters:
        otel_disabled_exclude:
          (): deepsearch_api.utils.OTELDisabledWarningFilter
        healthcheck_exclude:
          (): deepsearch_api.utils.AccessLogFilter
        grpc_error_exclude:
          (): deepsearch_api.utils.GRPCCommonFilter
        correlation_id:
          (): asgi_correlation_id.CorrelationIdFilter
          uuid_length: 32
          default_value: '-'
      formatters:
        default:
          "()": uvicorn.logging.DefaultFormatter
          format: '%(levelprefix)s %(asctime)s [%(correlation_id)s] %(name)s - %(message)s'
        access:
          "()": uvicorn.logging.AccessFormatter
          format: '%(levelprefix)s %(asctime)s [%(correlation_id)s] %(name)s - %(client_addr)s - "%(request_line)s" %(status_code)s'
      handlers:
        default:
          formatter: default
          class: logging.StreamHandler
          stream: ext://sys.stderr
          filters:
          - correlation_id
          - grpc_error_exclude
        access:
          formatter: access
          class: logging.StreamHandler
          stream: ext://sys.stdout
          filters:
            - correlation_id
            - healthcheck_exclude
      loggers:
        root:
          level: INFO
          handlers:
            - default
        uvicorn.error:
          level: INFO
          handlers:
            - default
          propagate: no
        uvicorn.access:
          level: INFO
          handlers:
            - access
          propagate: no
        search_backend_observability:
          level: INFO
          handlers:
            - default
          propagate: no
        deepsearch_api.request_duration_logger:
          level: INFO
          filters:
            - healthcheck_exclude
          handlers:
            - default
          propagate: no
        opentelemetry.sdk.trace:
          filters:
            - otel_disabled_exclude
        deepsearch_api.telemetry:
          level: INFO
          handlers:
            - default
          propagate: no


    service:
      path: /
      port: 8000
    # ------------------------------------------
    #  Default clusterIP setting
    # ------------------------------------------
      type: ClusterIP
    # # ----------------------------------------
    # #  NodePort configuration example
    # # ----------------------------------------
    #   type: nodeport
    #   nodeport: 30514
    # # ----------------------------------------
    # #  Ingress configuration example
    # # ----------------------------------------
    # type: ingress
    # host: <my ingress host name>
    # path: "/"
    # ------------------------------------------
    #  Load Balancer service configuration example
    #  IMPORTANT: Selected Load Balancer type must support WebSockets.
    #    For example in the case of an AWS deployment "NLB" loadbalancer
    #    type would be a suitable option, while "ELB" loadbalancer type
    #    will not work.
    # ------------------------------------------
    # type: loadbalancer
    # ------------------------------------------
    #  Additional service annotations
    #    * could be useful when setting type loadbalancer
    #    * when non provided - default service annotations defined in ``service.annotations`` will be used
    # ------------------------------------------
    #   annotations:
    #     service.beta.kubernetes.io/aws-load-balancer-type: "nlb"


    # LLM query parsing: parses free-text queries into
    # structured filters via POST /llm_parse/query (+ GET /llm_parse/fields for
    # filter discovery). By default it shares the LLM provider used by validation
    # (USDSEARCH_LLM_API_KEY / USDSEARCH_LLM_BASE_URL); set the `provider` block
    # below to point it at its own OpenAI-compatible endpoint instead. When the
    # LLM is disabled or unreachable the endpoints return 503 and clients fall
    # back to plain hybrid search.
    llm_parsing:
      # Enable the /llm_parse endpoints (-> USDSEARCH_LLM_PARSING_ENABLED).
      # Disabled by default; it requires an external LLM connection. Enable per
      # deployment once the LLM provider is configured.
      enabled: false
      # Model used for query parsing. Empty string keeps the application
      # default — currently `gcp/google/gemini-3.1-flash-lite-preview`
      # (see llm_parse/config.py) (-> USDSEARCH_LLM_PARSING_MODEL, only set when
      # non-empty).
      model: ""
      # Max output tokens for the query parser LLM call
      # (-> USDSEARCH_LLM_PARSING_MAX_TOKENS, only set when non-empty). Raise this
      # if structured output gets truncated on large field catalogs.
      max_tokens: 1536
      # Optional SEARCH-LLM-specific OpenAI-compatible endpoint. Leave base_url
      # and api_key empty to share the connection configured for validation /
      # vision_endpoint. A non-empty base_url and/or api_key overrides just that
      # field for the SEARCH role (-> USDSEARCH_LLM_PARSING_BASE_URL /
      # USDSEARCH_LLM_PARSING_API_KEY); the chart then provisions a dedicated
      # secret for the key (needs global.secrets.create.vlm=true).
      provider:
        api_key_secret_name: "usdsearch-llm-parsing-api-key-secret"
        api_key_secret_field: "api-key"
        api_key: ""
        env_prefix: "USDSEARCH_LLM_PARSING_"
        base_url: ""
      # Optional corpus USD-property grounding. Paste the
      # `usd_property_catalog.yaml` produced by the `/usd-property-catalog` skill
      # (a mapping with a `properties:` list) here; when set, the chart mounts it
      # (-> USDSEARCH_LLM_PARSING_PROPERTY_CATALOG_FILEPATH) and the parser grounds
      # the generic `usd_property` filter on the real keys/values in your corpus
      # (-> `$properties` in the prompt). Empty disables grounding.
      property_catalog: {}
      # System-prompt template for the query parser, mounted live by the chart
      # and loaded by the API (-> mounted file +
      # USDSEARCH_LLM_PARSING_PROMPT_FILEPATH); `$catalog`, `$properties`, and
      # `$today` are substituted at runtime. This reproduces the prompt shipped in the
      # application image verbatim, so what the chart deploys is exactly what you
      # see here — edit it to override. Set to "" to fall back to the in-image
      # copy (services/deepsearch_api/.../llm_parse/prompts/llm_parsing_system_prompt.txt).
      # Kept in sync with that copy by
      # ci/helm/tests/unit/test_llm_parsing_defaults_sync.sh (CI fails on drift).
      prompt: |
        You convert a user's natural-language 3D-asset search into a structured query.

        Account for EVERY meaningful part of the query — never silently drop a clause.
        Route each part into exactly one of three buckets:

        1. `semantic_query` — descriptive nouns and adjectives (what the asset *is*),
           e.g. "red sports car", "wooden pallet".
        2. `filters` — explicit, structured constraints that map onto a catalog field
           below. Use ONLY these fields:

        $catalog

        $properties

        3. `unmapped_constraints` — constraints the user clearly intends that match NO
           catalog field above. Record the verbatim fragment plus a short note saying
           what you understood and why no field fits. NEVER drop such a clause and NEVER
           fold it into `semantic_query`.

        Rules:
        - Only emit a filter when the query clearly expresses that constraint and a
          catalog field fits; otherwise it is either descriptive (`semantic_query`) or
          an `unmapped_constraint`.
        - Never invent a field, operator, or value not listed in the catalog. A
          constraint with no matching field is an `unmapped_constraint`, not a filter.
        - A descriptive word goes in `semantic_query`; a structured constraint with no
          catalog field goes in `unmapped_constraints` — do not mix the two.
        - Resolve relative dates against today's date ($today) and emit an ISO date (YYYY-MM-DD).
        - File sizes must be an integer plus a unit, e.g. "5MB".

        Examples (input -> JSON). The fields shown below exist in the default catalog;
        always pick from the catalog above, which is what this deployment supports:

        "usda chairs"
        -> {"semantic_query": "chair", "filters": [{"field": "file_type", "operator": "eq", "value": "usda"}], "unmapped_constraints": []}

        "forklifts created since the start of 2024"
        -> {"semantic_query": "forklift", "filters": [{"field": "created_at", "operator": "gte", "value": "2024-01-01"}], "unmapped_constraints": []}

        "outdoor furniture tagged as wooden"
        -> {"semantic_query": "outdoor furniture", "filters": [{"field": "tag", "operator": "eq", "value": "wooden"}], "unmapped_constraints": []}

        "low-poly glass bottles under 10k polygons"
        -> {"semantic_query": "glass bottle", "filters": [{"field": "polygon_count", "operator": "lt", "value": 10000}], "unmapped_constraints": []}

        "small props that fit in half a meter, files bigger than 10MB"
        -> {"semantic_query": "props", "filters": [{"field": "dimension", "operator": "lt", "value": 0.5}, {"field": "size", "operator": "gt", "value": "10MB"}], "unmapped_constraints": []}

        "crates where the class property is set to container"
        -> {"semantic_query": "crate", "filters": [{"field": "usd_property", "operator": "eq", "value": "class=container"}], "unmapped_constraints": []}

        "a red sports car"
        -> {"semantic_query": "red sports car", "filters": [], "unmapped_constraints": []}

        "pallets with Isaac version between 5 and 6"
        -> {"semantic_query": "pallet", "filters": [], "unmapped_constraints": [{"text": "Isaac version between 5 and 6", "note": "no 'Isaac version' field is available in this deployment"}]}

        "usda forklifts rated for 2 ton payloads"
        -> {"semantic_query": "forklift", "filters": [{"field": "file_type", "operator": "eq", "value": "usda"}], "unmapped_constraints": [{"text": "rated for 2 ton payloads", "note": "no payload/load-rating field is available in this deployment"}]}
      # LLM query parsing filter catalog — the `fields:` list of search_fields.yaml,
      # mounted live by the chart and loaded by the API (-> mounted file +
      # USDSEARCH_LLM_PARSING_FIELDS_FILEPATH). This reproduces the catalog shipped
      # in the application image verbatim, so the filters installed are exactly
      # what you see here — edit the list to add/remove fields. Set to null to
      # fall back to the in-image copy
      # (services/deepsearch_api/.../llm_parse/search_fields.yaml). Kept in sync
      # with that copy by ci/helm/tests/unit/test_llm_parsing_defaults_sync.sh
      # (CI fails on drift). SimReady physics filters are an opt-in extra (note
      # below); the default catalog is the 11 fields listed here.
      fields:
        - name: file_type
          type: array
          operators: [eq, in]
          description: File extension(s) of the asset. Maps to file_extension_include.
          examples:
            - '"usda files" -> file_type eq "usda"'
            - '"usd or usdc" -> file_type in ["usd","usdc"]'
          map: {kind: file_extension}
        - name: name
          type: string
          operators: [eq, contains]
          description: Asset file name or a substring of it.
          examples: ['"files named chair" -> name contains "chair"']
          map: {kind: name}
        - name: path_prefix
          type: string
          operators: [eq, contains]
          description: Directory path the asset lives under (no storage URL prefix).
          examples: ['"under /Projects/Vehicles" -> path_prefix eq "/Projects/Vehicles"']
          map: {kind: path}
        - name: created_at
          type: date
          operators: [gt, gte, lt, lte]
          description: Asset creation date (ISO YYYY-MM-DD). gt/gte -> created after; lt/lte -> created before.
          examples: ['"created since 2024" -> created_at gte "2024-01-01"']
          map: {kind: date_range, after_param: created_after, before_param: created_before}
        - name: modified_at
          type: date
          operators: [gt, gte, lt, lte]
          description: Asset last-modified date (ISO YYYY-MM-DD). gt/gte -> after; lt/lte -> before.
          examples: ['"changed before March 2024" -> modified_at lt "2024-03-01"']
          map: {kind: date_range, after_param: modified_after, before_param: modified_before}
        - name: size
          type: string
          operators: [gt, gte, lt, lte]
          description: "File size as an integer + unit (KB/MB/GB/TB), e.g. '5MB'. gt/gte -> larger; lt/lte -> smaller."
          examples: ['"bigger than 10 MB" -> size gt "10MB"']
          map: {kind: size_range}
        - name: created_by
          type: string
          operators: [eq]
          description: User/owner ID (or email) that created the asset.
          examples: ['"created by alice@example.com" -> created_by eq "alice@example.com"']
          map: {kind: passthrough, param: created_by}
        - name: tag
          type: string
          operators: [eq, contains]
          description: Asset tag value (or a `key=value` tag pair).
          examples: ['"tagged outdoor" -> tag eq "outdoor"']
          map: {kind: tag}
        - name: usd_property
          type: string
          operators: [eq]
          description: Generic exact USD property filter in `key=value` form; a value is required (e.g. `class=vehicle`). Do not emit a value-less `key=`; for property existence use a dedicated field.
          examples: ['"class is vehicle" -> usd_property eq "class=vehicle"']
          map: {kind: property_keyvalue}
        - name: polygon_count
          type: number
          operators: [gt, gte, lt, lte, eq]
          description: Mesh polygon count (geometry complexity). lt -> low-poly/simple; gt -> high-detail.
          examples: ['"low-poly assets under 10k polygons" -> polygon_count lt 10000']
          map:
            kind: property_numeric
            property: "__polygon_count"
            property_env: USDSEARCH_LLM_PARSING_POLYGON_COUNT_PROPERTY
        # --- Deployment-specific fields (not enabled by default) -------------------
        # Filters tied to SimReady-style USD properties — rigid-body physics
        # (physics_rigid_body), colliders (has_collider), object class
        # (object_class), mass (physics_mass), density (physics_density) — are NOT
        # part of the default catalog: they only return results on corpora indexed
        # with those property conventions. A complete ready-to-use catalog that
        # includes them ships next to search_fields.yaml as
        # `search_fields.simready.yaml`; point USDSEARCH_LLM_PARSING_FIELDS_FILEPATH
        # at it (helm: this `fields` list) or copy the entries you need. See
        # docs/search-filters.md.
        - name: dimension
          type: number
          operators: [gt, gte, lt, lte]
          description: Overall size in meters across all axes. lt -> small/fits in that cube; gt -> large.
          examples:
            - '"small objects under 1 meter" -> dimension lt 1'
            - '"large props over 3m" -> dimension gt 3'
          map: {kind: bbox}

    # Configuration of the temporary directory for the service. By default it is
    # set to use Memory medium
    tmpDir:
      emptyDir:
        medium: Memory
        sizeLimit: 256Mi

    ## Hybrid Search default configuration ################
    hybrid_search:
      scoring_config:
        rrf_config:
          rank_constant: 60
          query_rank_constants: {}
        hybrid_text:
          enabled: True
          weight: 1.2
          fields:
          - field: modified_by
            enabled: True
            weight: 5
            match_type: exact
            wildcard: True
            analyzer: "standard"
          - field: modified_by
            enabled: True
            weight: 5
            match_type: exact
            wildcard: False
            analyzer: "whitespace"
          - field: name
            nested: False
            enabled: True
            weight: 2
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: name.simple
            nested: False
            enabled: True
            weight: 2
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: name.standard
            nested: False
            enabled: True
            weight: 2
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: usd_properties.value
            nested: True
            enabled: True
            weight: 1
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: usd_properties.key
            nested: True
            enabled: True
            weight: 1
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: tags.tag
            nested: True
            enabled: True
            weight: 1
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: tags.value
            nested: True
            enabled: True
            weight: 1
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: path
            nested: False
            enabled: True
            weight: 1
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: path.tree
            nested: False
            enabled: True
            weight: 1
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: path.tree_reversed
            nested: False
            enabled: True
            weight: 1
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          - field: __VISION_METADATA_FIELDS__
            nested: False
            enabled: True
            weight: 1
            match_type: fuzzy
            fuzzy_max_expansions: 1
            wildcard: True
          # Exact-match name legs: boost results whose name matches the query
          # exactly (analyzer=keyword => the whole query is one token), weighted
          # well above the fuzzy name legs so a precise hit ranks first.
          - field: name
            nested: False
            enabled: True
            weight: 5
            match_type: exact
            analyzer: keyword
            wildcard: False
          - field: name.standard
            nested: False
            enabled: True
            weight: 5
            match_type: exact
            analyzer: keyword
            wildcard: False
          cross_field_operator: or
        vector_fields:
          siglip2-embedding.embedding:
            enabled: True
            weight: 1
            field_name: siglip2-embedding.embedding
            dimension: 1536

  # Metadata Indexing service
  indexing_cron:
    replicas: 1
    resources:
      requests:
        cpu: 0.5
        memory: 1Gi
      limits:
        cpu: 1
        # NOTE: this limit is set quite large by default, adjust it based on the
        #  Nucleus Server size the memory usage of the service starts to grow,
        #  when updates from the Nucleus server arrive faster than they are
        #  being processed
        memory: 2Gi


  indexing:
    replicas: 1

    # Custom annotations to add to the indexing deployment pod template
    # podAnnotations: {}
    # podAnnotations:
    #   custom.example.com/key: "value"
    podAnnotations:
      prometheus.io/path: /metrics
      prometheus.io/port: "8001"
      prometheus.io/scrape: "true"

    # It is possible to define the number of retries to limit the number of
    # times each of the assets in the redis stream will be attempted to be
    # processed by default this parameter is unset, which means it will try
    # to process each asset indefinitely.
    #
    # autoclaim_n_retries: 1000

    # Number of stream items the indexing service consumes and processes
    # concurrently per loop iteration (maps to the PROCESSING_BATCH_SIZE env
    # var). The default of 1 processes items serially; increasing it overlaps
    # the per-item Redis / storage round-trip latency for higher throughput.
    processing_batch_size: 1

    resources:
      requests:
        cpu: 0.5
        memory: 1Gi
      limits:
        cpu: 1
        # NOTE: this limit is set quite large by default, adjust it based on the
        #  Nucleus Server size the memory usage of the service starts to grow,
        #  when updates from the Nucleus server arrive faster than they are
        #  being processed
        memory: 2Gi
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 5

    # Enable liveness check before container start-up. This liveness checks verifies that
    # all resources that microservice depends on a ready before initialization. These
    # resources include:
    #  * Redis
    #  * NGSearch storage service
    enableLivenessChecks: true

  # Tags crawler service
  tagcrawler_cron:
    replicas: 1
    resources:
      requests:
        cpu: 0.5
        memory: 1Gi
      limits:
        cpu: 1
        # NOTE: this limit is set quite large by default, adjust it based on the
        #  Nucleus Server size the memory usage of the service starts to grow,
        #  when updates from the Nucleus server arrive faster than they are
        #  being processed
        memory: 2Gi

  tagcrawler:
    replicas: 1

    # Custom annotations to add to the tag-crawler deployment pod template
    # podAnnotations: {}
    # podAnnotations:
    #   custom.example.com/key: "value"
    podAnnotations:
      prometheus.io/path: /metrics
      prometheus.io/port: "8002"
      prometheus.io/scrape: "true"

    # It is possible to define the number of retries to limit the number of
    # times each of the assets in the redis stream will be attempted to be
    # processed by default this parameter is unset, which means it will try
    # to process each asset indefinitely.
    #
    # autoclaim_n_retries: 1000

    # Number of stream items the tag crawler consumes and processes
    # concurrently per loop iteration (maps to the PROCESSING_BATCH_SIZE env
    # var). The default of 1 processes items serially; increasing it overlaps
    # the per-item tag-read / storage round-trip latency for higher throughput.
    processing_batch_size: 1

    resources:
      requests:
        cpu: 0.5
        memory: 1Gi
      limits:
        cpu: 1
        # NOTE: this limit is set quite large by default, adjust it based on the
        #  Nucleus Server size the memory usage of the service starts to grow,
        #  when updates from the Nucleus server arrive faster than they are
        #  being processed
        memory: 2Gi
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 5

    # Enable liveness check before container start-up. This liveness checks verifies that
    # all resources that microservice depends on a ready before initialization. These
    # resources include:
    #  * Redis
    #  * NGSearch storage service
    enableLivenessChecks: true

  storage_cron:
    replicas: 1
    resources:
      requests:
        cpu: 1
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi
    es_cache_actualization:
      timeout: 86400   # 1 day
    es_cache_nucleus_verification:
      timeout: 86400   # 1 day
      remove_unsupported: false      # remove unsupported assets from the index

    # Enable liveness check before container start-up. This liveness checks verifies that
    # all resources that microservice depends on a ready before initialization. These
    # resources include:
    #  * Redis
    #  * NGSearch storage service
    enableLivenessChecks: true

# By default the indexing / storage / tag-crawler pods run the unified
# `usdsearch` image (see `global.image.usdsearch`). Override here to pin a
# different image for these pods only.
image:
  name: ""
  tag: ""

imagePullPolicy: IfNotPresent
imagePullSecrets:
  - name: "nvcr.io"
nameOverride: ""
fullnameOverride: ""

# create omniverse service user
CREATE_SERVICE_USER: false

# environment variables
env:
  # You can provide additional environment variables as follows
  #  - name: 'VARIABLE NAME'
  #    value: 'VARIABLE VALUE'

##############################
# Search Query configuration
##############################

query_config: |
  vision_generated_metadata_query:
    type: "multi_match"
    bool_relation: "filter"
    parameters:
      fields: ["vision_generated_*"]
      type: "best_fields"
      analyzer: "standard"  # important, otherwise text will be treated as keywords
      minimum_should_match: 100%
      _name: "vision_metadata_multimatch"


##############################################
## Ingress set-up
##############################################
#
# If any of the service endpoint had ingress type you need to additionally
# set ingress.enabled parameter from below to "true".

ingress:
  enabled: false
  annotations:
    ingress.kubernetes.io/service-upstream: "true"

# set-up metrics backend
metrics:
  enabled: true
  port: 8000
  type: ClusterIP

## Account to use
serviceAccount:
  create: true

################################################################################
## Security Context configuration
################################################################################

podSecurityContext:
  fsGroup: 1001
  runAsUser: 1001
  runAsNonRoot: true

securityContext:
  readOnlyRootFilesystem: true

################################################################################
## END
################################################################################

loggingConfig:
  version: 1
  disable_existing_loggers: False
  filters: {}
  formatters:
    default:
      format: '%(levelname)s %(asctime)s %(name)s - %(message)s'
  handlers:
    default:
      formatter: default
      class: logging.StreamHandler
      stream: ext://sys.stderr
  loggers:
    opensearch:
      level: ERROR
    search_utils.cache_utils:
      level: WARNING
    root:
      level: INFO
      handlers:
        - default
