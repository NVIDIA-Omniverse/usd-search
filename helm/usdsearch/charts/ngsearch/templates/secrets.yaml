{{  $deploymentSelectorLabels := include "ngsearch.MainDeploymentSelectorlabels" . }}
{{- $values := .Values -}}

{{- if .Values.global.secrets.create.vlm }}
  {{- if .Values.microservices.search_rest_api.validation.enabled }}

{{- with .Values.microservices.search_rest_api.validation}}

apiVersion: v1
kind: Secret
type: Opaque
metadata:
  {{- include "ngsearch.template.vlm.apiKeySecretName" (dict "source" .provider) | nindent 2}}
  annotations:
    {{- toYaml $values.global.secrets.annotations | nindent 4}}
  labels:
    {{- $deploymentSelectorLabels | nindent 4 }}
data:
  {{- include "ngsearch.template.vlm.apiKeySecretValue" (dict "source" .provider "vlm_type" "provider") | nindent 2}}
---
    {{- end }}
  {{- end }}
  {{- /* SEARCH-LLM-specific endpoint key — only when the deployment opted into
         its own provider (llm_parsing.provider.api_key set). The shared-connection
         case reuses the validation secret above. */}}
  {{- if and .Values.microservices.search_rest_api.llm_parsing.enabled .Values.microservices.search_rest_api.llm_parsing.provider.api_key }}

{{- with .Values.microservices.search_rest_api.llm_parsing}}

apiVersion: v1
kind: Secret
type: Opaque
metadata:
  {{- include "ngsearch.template.vlm.apiKeySecretName" (dict "source" .provider) | nindent 2}}
  annotations:
    {{- toYaml $values.global.secrets.annotations | nindent 4}}
  labels:
    {{- $deploymentSelectorLabels | nindent 4 }}
data:
  {{- include "ngsearch.template.vlm.apiKeySecretValue" (dict "source" .provider "vlm_type" "provider") | nindent 2}}
---
    {{- end }}
  {{- end }}
{{- end }}
