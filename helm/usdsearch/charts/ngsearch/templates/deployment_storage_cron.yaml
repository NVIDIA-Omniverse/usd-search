{{  $fullName := include "ngsearch.fullname" . -}}
{{- $serviceName := "storage-cron-worker" -}}
{{- $fullServiceName := printf "%s-%s" $fullName $serviceName -}}
{{- $dockerImage := include "ngsearch.ngsearchDockerImage" . -}}
{{- $globalImagePullSecrets := include "deepsearch-global.imagePullSecrets" . -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullServiceName }}
  labels:
    {{- include "ngsearch.MainDeploymentlabels" . | nindent 4 }}
    ngsearch.service.name: {{ $serviceName }}
spec:
  replicas: {{ .Values.microservices.storage_cron.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ngsearch.MainDeploymentSelectorlabels" . | nindent 6 }}
      ngsearch.service.name: {{ $serviceName }}
  template:
    metadata:
      annotations:
        checksum/env-config-map: {{ include (print $.Template.BasePath "/env_config_map.yaml") . | sha256sum }}
        checksum/storage-backend-config: {{ include (print $.Template.BasePath "/storage_backend_config.yaml") . | sha256sum }}
        checksum/logging-config: {{ include (print $.Template.BasePath "/logging_config_map.yaml") . | sha256sum }}
      labels:
        {{- include "ngsearch.MainDeploymentSelectorlabels" . | nindent 8 }}
        ngsearch.service.name: {{ $serviceName }}
    spec:
      {{- $globalImagePullSecrets | nindent 6 }}
      hostname: {{ $fullName }}
      subdomain: {{ $fullName }}-subdomain
      volumes:
      - name: logging-config
        configMap:
          name: {{ $fullName }}-logging
          items:
            - key: logging.yaml
              path: logging.yaml
      serviceAccountName: {{ include "ngsearch.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      dnsConfig:
        searches:
          {{- range .Values.global.dnsConfig.searches }}
          - {{ . }}
          {{- end }}
      containers:
        - name: storage
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ $dockerImage }}
          command:
          - python
          - -m
          - storage.src.run_cron
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
          - containerPort: 8007
            name: metrics
          volumeMounts:
          - mountPath: /logging.yaml
            name: logging-config
            subPath: logging.yaml
          resources:
            {{- toYaml .Values.microservices.storage_cron.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "ngsearch.fullname" . }}-env-config
          env:
            - name: LOGGING_CONFIG
              value: /logging.yaml
            - name: STORAGE_SERVICE_USE_CRON_JOBS
              value: "True"
            - name: IDL_SERIALIZER
              value: "orjson"
            - name: ASSETDB_PATH
              value: /data
          {{- if eq .Values.global.storage_backend_type "nucleus" }}
            {{- include "deepsearch-global.nucleusComplete" . | nindent 12 }}
          {{- else if eq .Values.global.storage_backend_type "s3" }}
            {{- include "deepsearch-global.s3Complete" . | nindent 12 }}
          {{- else if eq .Values.global.storage_backend_type "azure" }}
            {{- include "deepsearch-global.azureComplete" . | nindent 12 }}
          {{- else if eq .Values.global.storage_backend_type "storage_api" }}
            {{- include "deepsearch-global.storageApiComplete" . | nindent 12 }}
          {{- end}}
            {{- include "deepsearch-global.searchBackendComplete" . | nindent 12 }}
            - name: USER_AGENT
              value: "NGSearch.StorageCron/{{ .Values.image.tag }}"
            - name: SERVICE_DISCOVERY_TOKEN
              value: /.keys/svc_reg_token
            - name: USE_DISCOVERY
              value: "False"
            - name: ES_CACHE_ACTUALIZATION_TIMEOUT
              value: {{ .Values.microservices.storage_cron.es_cache_actualization.timeout | quote }}
            - name: ES_CACHE_NUCLEUS_VERIFICATION_TIMEOUT
              value: {{ .Values.microservices.storage_cron.es_cache_nucleus_verification.timeout | quote }}
            - name: ES_CACHE_NUCLEUS_VERIFICATION_REMOVE_UNSUPPORTED
              value: {{ .Values.microservices.storage_cron.es_cache_nucleus_verification.remove_unsupported | quote }}
      {{- if .Values.microservices.storage_cron.enableLivenessChecks }}
      initContainers:
        - name: redis-liveness-check
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ $dockerImage }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
          - python
          - -m
          - search_utils.redis.wait_ready
          envFrom:
            - configMapRef:
                name: {{ $fullName }}-env-config
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 128Mi
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
