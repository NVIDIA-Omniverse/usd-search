{{  $fullName := include "ngsearch.fullname" . -}}
{{- $excludeIndexingStringsPatterns := include "ngsearch.excludeIndexingStringsPatterns" . -}}
{{- $access_key := include "ngsearch.admin.access_key" . -}}


apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ngsearch.fullname" . }}-env-config
  labels:
    {{- include "ngsearch.labels" . | nindent 4 }}
data:
{{- range .Values.env -}}
  {{- .name | nindent 2 }}: {{ .value | quote }}
{{- end }}
  OV_CONN_PING_S: "-1"
  STORAGE_BACKEND_TYPE: "{{ .Values.global.storage_backend_type }}"
  OV_INSTANCE: "{{ $fullName }}"
  ENABLE_TRACING: "{{ (.Values.global.tracing).enabled | default "False" }}"
  EXTENDED_TRACING: "{{ (.Values.global.tracing).extended_tracing | default "False" }}"
  LS_ACCESS_TOKEN: "{{ (.Values.global.tracing).ls_access_token | default "" }}"
  TRACING_BACKEND: "{{ (.Values.global.tracing).tracing_backend | default "otlp" }}"
  ASSET_GRAPH_SERVICE_ENDPOINT: "http://{{ .Release.Name }}-asset-graph-service.{{ .Release.Namespace }}.svc.cluster.local:8000"
  PYTHONOPTIMIZE: "1"
  PYTHONUNBUFFERED: "1"
  OPENBLAS_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"
  ASSETDB_PATH: "/tmp"
  REDIS_URL: "redis://{{ .Release.Name }}-redis-master.{{ .Release.Namespace }}.svc.cluster.local"
  REDIS_STREAM_URL: "redis://{{ .Release.Name }}-redis-master.{{ .Release.Namespace }}.svc.cluster.local"
  NUMBER_OF_SHARDS: "{{ .Values.global.search_backend_config.number_of_shards }}"
  OMNIJSON_VALIDATION_ENABLED: "False"
  ASSERT_ADMIN_USER: "{{ .Values.global.nucleus.assert_admin_user }}"
  EMBEDDING_CLIENT_CONFIG_CLIENT_TYPE: embedding_service
  {{- if not .Values.global.embedding_deployment.endpoint }}
  TRITON_SERVER_URL: "{{ .Release.Name }}-deepsearch-embedding-inference.{{ .Release.Namespace }}.svc.cluster.local:8001"
  {{- else }}
    {{- if .Values.global.embedding_deployment.triton_server.ssl.enabled }}
  TRITON_SERVER_SSL: "true"
    {{- end }}
    {{- if .Values.global.embedding_deployment.triton_server.headers }}
  TRITON_SERVER_HEADERS: {{ .Values.global.embedding_deployment.triton_server.headers | toJson | quote }}
    {{- end }}
  TRITON_SERVER_URL: {{ .Values.global.embedding_deployment.endpoint | quote }}
  {{- end }}
  OV_EXCLUDE_PATHS_INDEXING: "{{ $excludeIndexingStringsPatterns }}"
  OS_BACKEND_SETTINGS_RETRY_ON_CONFLICT: "5"
  DEEPSEARCH_BACKEND_USE_PROM_METRICS: "True"
  {{- with .Values.microservices.search_rest_api.admin_authentication }}
  {{- if .enabled }}
  DEEPSEARCH_BACKEND_ADMIN_ACCESS_KEY: {{ .access_key | default $access_key }}
  {{- end }}
  {{- end }}
  BASE_LOGGING_ENABLE_JSON_LOGGING: {{ .Values.global.enable_structured_logging | quote}}
