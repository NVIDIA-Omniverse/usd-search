{{  $fullName := include "deepsearch.fullname" . -}}
{{- $values := .Values -}}

{{- if not .Values.global.embedding_deployment.endpoint }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deepsearch.fullname" . }}-embedding-model-config
  labels:
    {{- include "deepsearch.labels" . | nindent 4 }}
data:
  siglip2_vision_encoder_onnx-config.pbtxt: |
    name: "siglip2_vision_encoder_onnx"
    backend: "onnxruntime"
    platform: "onnxruntime_onnx"
    max_batch_size: 0

    input [
      {
        name: "pixel_values"
        data_type: TYPE_FP32
        dims: [-1, 3, 384, 384]
      }
    ]

    output [
      {
        name: "image_embeds"
        data_type: TYPE_FP32
        dims: [-1, 1536]
      }
    ]

    instance_group [
      {
        count: 1
        kind: KIND_AUTO
      }
    ]

{{- end }}