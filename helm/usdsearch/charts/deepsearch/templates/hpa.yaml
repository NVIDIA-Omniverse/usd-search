{{  $fullName := include "deepsearch.fullname" . -}}
{{- $nonFarmServiceName := "non-farm-worker" -}}
{{- $fullNonFarmServiceName := printf "%s-%s" $fullName $nonFarmServiceName -}}
{{- $writerServiceName := "omni-writer" -}}
{{- $fullWriterServiceName := printf "%s-%s" $fullName $writerServiceName -}}
{{- $fullPluginWorkerServiceName := printf "%s-worker" $fullName -}}
{{- $deploymentLabels := include "deepsearch.MainDeploymentlabels" . }}
{{- $release := .Release -}}

{{- range $plugin_name, $plugin_config := .Values.plugins }}
  {{- if $plugin_config.active }}
    {{- with $plugin_config.hpa }}
      {{- if .enabled }}

apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  labels:
    {{- $deploymentLabels | nindent 4 }}
  name: worker-{{ $plugin_name | replace "_" "-" }}
  namespace: {{ $release.Namespace }}
spec:
  maxReplicas: {{ .maxReplicas | default 1 }}
  minReplicas: {{ .minReplicas | default 1 }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $fullPluginWorkerServiceName }}-{{ $plugin_name | replace "_" "-" }}
  targetCPUUtilizationPercentage: {{ .targetCPUUtilizationPercentage | default 80 }}

---
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}

{{- if .Values.microservices.omni_writer.hpa.enabled }}

---

apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  labels:
    {{- include "deepsearch.MainDeploymentlabels" . | nindent 4 }}
  name: {{ $fullWriterServiceName }}
  namespace: {{ .Release.Namespace }}
spec:
  maxReplicas: {{ .Values.microservices.omni_writer.hpa.maxReplicas }}
  minReplicas: {{ .Values.microservices.omni_writer.hpa.minReplicas }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $fullWriterServiceName }}
  targetCPUUtilizationPercentage: 80

{{- end }}

