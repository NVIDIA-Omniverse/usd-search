{{  $fullName := include "deepsearch.fullname" . -}}
{{- $global := .Values.global -}}
{{- $values := .Values -}}
{{- $deploymentSelectorLabels := include "deepsearch.MainDeploymentSelectorlabels" . }}


{{- if $global.secrets.create.vlm }}
  {{- range $plugin_name, $plugin_config := $values.plugins }}
    {{- if and ( $plugin_config.requires_vision_metadata ) ( $plugin_config.vision_endpoint.vlm_service | default $values.vision_endpoint.vlm_service ) }}

{{- $vlm_service := ( $plugin_config.vision_endpoint.vlm_service | default $values.vision_endpoint.vlm_service ) -}}

apiVersion: v1
kind: Secret
type: Opaque
metadata:
{{- if eq $vlm_service "azure_openai"}}
  {{- include "deepsearch.template.vlm.apiKeySecretName" (dict "source" $plugin_config.vision_endpoint.azure_openai "default" $values.vision_endpoint.azure_openai) | nindent 2}}
{{- else if eq $vlm_service "openai"}}
  {{- include "deepsearch.template.vlm.apiKeySecretName" (dict "source" $plugin_config.vision_endpoint.openai "default" $values.vision_endpoint.openai) | nindent 2}}
{{- else if eq $vlm_service "anthropic"}}
  {{- include "deepsearch.template.vlm.apiKeySecretName" (dict "source" $plugin_config.vision_endpoint.anthropic "default" $values.vision_endpoint.anthropic) | nindent 2}}
{{- else if eq $vlm_service "mistralai"}}
  {{- include "deepsearch.template.vlm.apiKeySecretName" (dict "source" $plugin_config.vision_endpoint.mistralai "default" $values.vision_endpoint.mistralai) | nindent 2}}
{{- else if eq $vlm_service "google"}}
  {{- include "deepsearch.template.vlm.apiKeySecretName" (dict "source" $plugin_config.vision_endpoint.google "default" $values.vision_endpoint.google) | nindent 2}}
{{- else if eq $vlm_service "nim"}}
  {{- include "deepsearch.template.vlm.apiKeySecretName" (dict "source" $plugin_config.vision_endpoint.nim "default" $values.vision_endpoint.nim) | nindent 2}}
{{- else if eq $vlm_service "qwen"}}
  {{- include "deepsearch.template.vlm.apiKeySecretName" (dict "source" $plugin_config.vision_endpoint.qwen "default" $values.vision_endpoint.qwen) | nindent 2}}
{{- else if eq $vlm_service "inference_hub"}}
  {{- include "deepsearch.template.vlm.apiKeySecretName" (dict "source" $plugin_config.vision_endpoint.inference_hub "default" $values.vision_endpoint.inference_hub) | nindent 2}}
{{- end }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    {{- toYaml $global.secrets.annotations | nindent 4}}
  labels:
    {{- $deploymentSelectorLabels | nindent 4 }}
data:
{{- if eq $vlm_service "azure_openai" -}}
  {{- include "deepsearch.template.vlm.apiKeySecretValue" (dict "source" $plugin_config.vision_endpoint.azure_openai "default" $values.vision_endpoint.azure_openai "vlm_type" $vlm_service) | nindent 2}}
{{- else if eq $vlm_service "openai" -}}
  {{- include "deepsearch.template.vlm.apiKeySecretValue" (dict "source" $plugin_config.vision_endpoint.openai "default" $values.vision_endpoint.openai "vlm_type" $vlm_service) | nindent 2 }}
{{- else if eq $vlm_service "anthropic" -}}
  {{- include "deepsearch.template.vlm.apiKeySecretValue" (dict "source" $plugin_config.vision_endpoint.anthropic "default" $values.vision_endpoint.anthropic "vlm_type" $vlm_service) | nindent 2 }}
{{- else if eq $vlm_service "mistralai" -}}
  {{- include "deepsearch.template.vlm.apiKeySecretValue" (dict "source" $plugin_config.vision_endpoint.mistralai "default" $values.vision_endpoint.mistralai "vlm_type" $vlm_service) | nindent 2 }}
{{- else if eq $vlm_service "google" -}}
  {{- include "deepsearch.template.vlm.apiKeySecretValue" (dict "source" $plugin_config.vision_endpoint.google "default" $values.vision_endpoint.google "vlm_type" $vlm_service) | nindent 2 }}
{{- else if eq $vlm_service "nim" -}}
  {{- include "deepsearch.template.vlm.apiKeySecretValue" (dict "source" $plugin_config.vision_endpoint.nim "default" $values.vision_endpoint.nim "vlm_type" $vlm_service) | nindent 2 }}
{{- else if eq $vlm_service "qwen" -}}
  {{- include "deepsearch.template.vlm.apiKeySecretValue" (dict "source" $plugin_config.vision_endpoint.qwen "default" $values.vision_endpoint.qwen "vlm_type" $vlm_service) | nindent 2 }}
{{- else if eq $vlm_service "inference_hub" -}}
  {{- include "deepsearch.template.vlm.apiKeySecretValue" (dict "source" $plugin_config.vision_endpoint.inference_hub "default" $values.vision_endpoint.inference_hub "vlm_type" $vlm_service) | nindent 2 }}
{{- end }}
---  
    {{- end }}
  {{- end }}
{{- end }}
