{{  $fullName := include "deepsearch.fullname" . -}}
{{- $global := .Values.global -}}
{{- $values := .Values -}}
{{- $deploymentSelectorLabels := include "deepsearch.MainDeploymentSelectorlabels" . }}


{{- if $global.secrets.create.vlm }}
  {{- range $plugin_name, $plugin_config := $values.plugins }}
    {{- if $plugin_config.requires_vision_metadata }}

apiVersion: v1
kind: Secret
type: Opaque
metadata:
  {{- include "deepsearch.template.vlm.apiKeySecretName" (dict "source" $plugin_config.vision_endpoint.provider "default" $values.vision_endpoint.provider) | nindent 2}}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    {{- toYaml $global.secrets.annotations | nindent 4}}
  labels:
    {{- $deploymentSelectorLabels | nindent 4 }}
data:
  {{- include "deepsearch.template.vlm.apiKeySecretValue" (dict "source" $plugin_config.vision_endpoint.provider "default" $values.vision_endpoint.provider "vlm_type" "provider") | nindent 2}}
---
    {{- end }}
  {{- end }}
{{- end }}
