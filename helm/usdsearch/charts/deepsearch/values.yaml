# Default values for inference.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# # ----------------------------------------------------
# # ------- MAIN parameters to set-up ------------------

################################################################################
## Indexing configuration parameters
################################################################################

# It is possible to override the global exclude_patterns setting for DeepSearch 
# service specifically. In order to do so please update the following variable. 
# The syntax of this variable should follow the same pattern as in exclude_patterns:
# 
# exclude_patterns:
# - <regex 1>
# - <regex 2>
#
# Here regex 1 and regex 2 are some regular expressions that can be found in 
# a file path. For example the following value:
# 
# exclude_patterns:
# - /.thumbs/
# - .__omni_channel__
#
# will filter out all items that are within ".thumbs" folders and all those 
# assets that contain "__omni_channel__" in the file path

# --
# @raw
#
# Vision endpoint configuration settings. 
#
# The following types of services are currently supported:
#   * azure_openai
#   * openai
#   * anthropic
#   * mistralai
#   * google
#   * nim
#   * qwen
#   * inference_hub
#
vision_endpoint:
  vlm_service: ""
  azure_openai:
    api_key_secret_name: "azure-openai-vlm-api-key-secret"
    api_key_secret_field: "api-key"
    api_key: ""
    env_prefix: "AZURE_OPENAI_"
