# Default values for inference.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# # ----------------------------------------------------
# # ------- MAIN parameters to set-up ------------------

################################################################################
## Indexing configuration parameters
################################################################################

# It is possible to override the global exclude_patterns setting for DeepSearch
# service specifically. In order to do so please update the following variable.
# The syntax of this variable should follow the same pattern as in exclude_patterns:
#
# exclude_patterns:
# - <regex 1>
# - <regex 2>
#
# Here regex 1 and regex 2 are some regular expressions that can be found in
# a file path. For example the following value:
#
# exclude_patterns:
# - /.thumbs/
# - .__omni_channel__
#
# will filter out all items that are within ".thumbs" folders and all those
# assets that contain "__omni_channel__" in the file path

# --
# @raw
#
# Vision endpoint configuration settings.
#
# All LLM/VLM access goes through ONE OpenAI-compatible provider (`provider.api_key` -> `USDSEARCH_LLM_API_KEY`, `provider.base_url` -> `USDSEARCH_LLM_BASE_URL`). The stack ships pointed at a default endpoint (NVIDIA Inference Hub); point `base_url` at any OpenAI-API-compatible server to use a different one.
#
vision_endpoint:
  provider:
    api_key_secret_name: "usdsearch-llm-api-key-secret"
    api_key_secret_field: "api-key"
    api_key: ""
    env_prefix: "USDSEARCH_LLM_"
    base_url: "https://inference-api.nvidia.com"
  # Model used for batch metadata generation, on the provider above.
  metadata_model: "gcp/google/gemini-3.1-pro-preview"

  #
  # Configuration of metadata fields extracted by the VLM-based auto-captioning system
  #
  # Default schema mirrors packages/llm-client/.../metadata/metadata_fields.yaml so
  # the helm-shipped default matches the package. Edit per deployment as needed.
  metadata_fields:

  - name: caption
    description: A concise, specific title (5-12 words) naming the object precisely, e.g. "Counterbalance warehouse forklift" or "Ergonomic mesh office chair".
    type: str

  - name: description
    description: One or two factual sentences describing what the asset is, its notable visual features, materials, and typical function. Describe only what is visible; do not invent backstory.
    type: str

  - name: object_type
    description: The single most specific common noun for the object (lowercase), e.g. "forklift", "office chair", "fire extinguisher", "robot gripper". Prefer the precise term over a generic one.
    type: str

  - name: category
    description: The single best top-level category (choose exactly one), e.g. furniture, appliance, electronics, lighting, vehicle, robot, machinery, tool, material_handling, container, structure, signage, safety_equipment, sensor, prop, other.
    type: str

  - name: tags
    description: 8-15 lowercase keywords a user might search, most→least relevant - object name + synonyms, specific type/variant, visible parts/features, brand or model text, and domain/industry terms. This field drives most retrieval.
    type: list[str]

  - name: use_cases
    description: Pipelines, domains, or applications this asset suits (lowercase, 0-6), e.g. "synthetic data generation", "warehouse simulation", "robotics manipulation", "digital twin", "game environment".
    type: list[str]

  - name: environment
    description: Typical real-world settings where this asset is found (lowercase, 0-5), e.g. "warehouse", "factory floor", "office", "retail store", "kitchen", "outdoor".
    type: list[str]

  - name: colors
    description: Dominant colors, most→least prominent (max 5), using simple searchable names (red, blue, gray, beige, ...). Add a modifier only when distinctive (dark_gray, safety_yellow).
    type: list[str]

  - name: materials
    description: Apparent materials, primary→secondary (max 5), e.g. steel, aluminum, wood, plastic, glass, fabric, leather, rubber, concrete, cardboard.
    type: list[str]

  - name: style
    description: The dominant visual/representation style (choose exactly one), e.g. photorealistic, realistic, stylized, cartoon, low_poly, hand_painted, sci_fi, modern, industrial, cad, scanned.
    type: str

  - name: scale
    description: Approximate real-world size class (choose exactly one) - tiny (fits in a hand), small (desktop), medium (human-scale / furniture), large (vehicle / machine), huge (building / structure), unknown.
    type: str

  - name: state
    description: Apparent condition / finish (choose exactly one) - pristine, new, used, worn, weathered, damaged, dirty, unknown.
    type: str

  - name: physical_attributes
    description: Functional / mechanical traits relevant to simulation and robotics (lowercase, 0-6), from - articulated, has_moving_parts, wheeled, deformable, rigid, stackable, graspable, openable, foldable, transparent, emissive, reflective, mounted, modular.
    type: list[str]

  - name: visible_text
    description: Any legible text, labels, brand names, model numbers, signage, or warnings on the asset (verbatim, 0-6 short strings). Empty list if none. A strong, unique search signal.
    type: list[str]

  - name: is_high_quality
    description: True if the asset looks high quality - complete and properly textured, with clean geometry, plausible materials, and no obviously missing parts. False if it is a bare primitive, placeholder, or visually incomplete.
    type: bool

  - name: has_issues
    description: True if there are visible defects - missing/pink textures, UV errors, stretched textures, artifacts, or incomplete geometry. False if it renders cleanly.
    type: bool

  #
  # Image prompt provided to the VLM-based auto-captioning system
  #
  image_prompt: |
    You are an expert 3D asset cataloguer for USD Search, an asset library used across
    synthetic data generation, robotics & simulation, industrial / warehouse / logistics,
    autonomous driving, architecture, retail, digital twins, and games & film.

    Analyze the provided rendered images of a single 3D asset and produce rich, accurate,
    searchable metadata. Optimize for retrieval: imagine the many different users —
    a robotics engineer, an SDG pipeline, a warehouse digital-twin team, a game artist —
    and capture the terms each of them would search for.

    ## How to analyze
    1. Identify the object as specifically as possible (not "vehicle" but "counterbalance forklift").
    2. Note its function and which domains/pipelines it suits.
    3. Read any visible text, branding, labels, or signage.
    4. Note materials, dominant colors, real-world scale, condition, and any mechanical traits.
    5. Brainstorm the keywords and synonyms a real user would type to find it.

    ## Output format (JSON object with exactly these fields)
    {metadata_types}

    ## Field definitions
    {metadata_definitions}

    ## Rules
    - Output ONLY a valid JSON object with every field above — no prose, no markdown.
    - Describe only what is actually visible. Never invent brands, text, or function.
    - When a field doesn't apply or can't be determined, use "unknown" for single-value
      string fields and an empty list `[]` for list fields. Do not guess.
    - Be specific over generic; prefer precise nouns and industry terms.
    - Use lowercase for tags, object_type, use_cases, environment, colors, materials,
      physical_attributes (captions and verbatim visible_text keep natural casing).
    - Pick exactly ONE value for category, style, scale, and state from their allowed lists.
    - Tags are the most important field: be thorough, include synonyms and domain terms.
    - Quality flags must be honest — they let users filter out broken assets.

thumbnail_settings:
  relative_location: ".thumbs"
  suffixes:
    - ""
    - ".auto"
  filepath_patterns:

microservices:
  # set-up monitor service that scans omniverse in the background
  monitor:
    # By default the monitor / info-endpoint / plugin-worker pods all run the
    # unified `usdsearch` image (see `global.image.usdsearch`). Override
    # `name`/`tag` here to pin a different image for these pods only.
    image:
      name: ""
      tag: ""

    resources:
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        # NOTE: here 2 CPUs are: 1 for the main python loop and the other one for prometheus metrics exporter
        cpu: 1
        # NOTE: this limit is set quite large by default, adjust it based on the
        #  Nucleus Server size the memory usage of the service starts to grow,
        #  when updates from the Nucleus server arrive faster than they are
        #  being processed
        memory: 2Gi

    # Enable liveness check before container start-up. This liveness checks verifies that
    # all resources that microservice depends on a ready before initialization. These
    # resources include:
    #  * Redis
    enableLivenessChecks: true

    # Additional pod annotations for the monitor service
    extraPodAnnotations: {}

    # Number of assets the monitor-crawler consumes and processes concurrently
    # per loop iteration (maps to the PROCESSING_BATCH_SIZE env var). The
    # default of 1 processes assets serially; increasing it overlaps the
    # per-asset Redis / storage round-trip latency for higher throughput on
    # large servers. Tune alongside the `resources` limits above.
    processing_batch_size: 1

  monitor_cron:
    replicas: 1

  monitor_crawler_cron:
    resources:
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        # NOTE: here 2 CPUs are: 1 for the main python loop and the other one for prometheus metrics exporter
        cpu: 1
        # NOTE: this limit is set quite large by default, adjust it based on the
        #  Nucleus Server size the memory usage of the service starts to grow,
        #  when updates from the Nucleus server arrive faster than they are
        #  being processed
        memory: 2Gi

    # Enable liveness check before container start-up. This liveness checks verifies that
    # all resources that microservice depends on a ready before initialization. These
    # resources include:
    #  * Redis
    #  * NGSearch storage service
    enableLivenessChecks: true

  # configuration for the rendering service
  rendering_service:
    enabled: false
    authentication:
      enabled: false
      api_key:
      api_key_secret_name: rendering-service-api-key-secret
      api_key_secret_field: api-key
    settings:
      rendering_service_url:
      endpoint: /usdsearch/render
      health_check_endpoint: /health
      force_render: True
      enable_caching: False
      extra_headers:
        NVCF-POLL-SECONDS: "600"
      maximum_parallel_requests: 10

  # configuration for the k8s renderer Job
  k8s_renderer:
    enabled: true
    # By default the renderer Job runs the unified `rendering-job` (Kit) image
    # (see `global.image.rendering_job`). Override here to pin a different
    # image for the renderer only.
    image:
      name: ""
      tag: ""

    # verify k8s ssl certificates
    verify_k8s_ssl_cert: true

    # additional environment variables
    env:

    # It is possible to increase the number of parallel Kit workers that would process
    # assets on a single GPU
    n_parallel_kit_workers: 1

    # It is possible to specify the number of assets that are processed by a Kit worker,
    # before it is being re-created.
    #
    # Setting this parameter to a negative value will make all items to be processed by
    # a single Kit worker
    n_assets_per_worker: 1

    # -- (bool)
    # @raw
    #
    # When set to ``True`` and the USD asset being rendered has a default prim defined, the asset is referenced into the default scene rather than opened as a sublayer. If the USD asset does not have a default prim, the system falls back to loading the entire USD scene as a sublayer.
    load_asset_as_reference: true

    # amount of time pod is kept after completion
    ttlSecondsAfterFinished: 3600
    # deadline for execution (default 2 hours)
    activeDeadlineSeconds: 7200

    render_job_pod_annotations: {}

    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"

    resources: {}

    persistence:
      initVolumePermissions: false

    # verify that storage backend is accessible by the rendering job
    # This should prevent Kit instances from being created in case storage
    # backend is inaccessible
    checkStorageBackendAccess: true

    # Maximum number of parallel rendering jobs that are created. If this
    # parameter is unset - then no limit on the number of parallel Kit jobs is
    # applied and all available resources will be used.
    maxRenderingJobsCount:

    securityContext:
      fsGroup: 1000
      runAsUser: 1000
      runAsNonRoot: true

  plugin_worker:
    sentry_dsn: ""
    settings:
      # Number of concurrent workers that are getting new plugin jobs from cache
      # and sending them for processing
      n_concurrent_queue_workers: 1

    rendering_settings:
      # rendering type can be either k8s or rendering_service
      renderer_type: k8s
      # Number of samples packages in a batch before the rendering request
      # is sent for rendering:
      #   > setting this parameter too small may result in time being lost on
      #     job initialization
      #   > setting this parameter too big may result in too many rendering
      #     requests sent to a single job, while other jobs remain idle
      client_batch_size: 16

      # Maximum number of seconds to wait before sending a batch of rendering
      # requests to a single job.
      client_batch_timeout: 30

      # Maximum number of pending rendering jobs that are allowed before a new
      # one is created. If the value of this parameter is set below 0 - this
      # setting is ignored.
      #
      # By default the number of pending jobs is set to 0, so that cluster
      #is not flooded with too many pending rendering jobs.
      pending_job_limit: 0

      # Number of seconds to wait when to retry when rendering service is busy
      #
      # **NOTE**: only applicable when ``rendering_type`` is ``rendering_service``
      retry_timeout_on_busy: 10

      # Maximum size, in bytes, of a single WebSocket frame the farm result
      # receiver (``FarmWebsocketServer``) will accept from a rendering job.
      # Exported as ``FARM_CLIENT_WS_MAX_SIZE`` on rendering-based plugin
      # workers.
      #
      # Defaults to 1 GiB (``1073741824``) to match the code default. This bounds
      # the memory a single oversized — or maliciously zlib-bomb-compressed —
      # render payload can allocate before it is rejected, closing an
      # unauthenticated-WebSocket OOM vector. A second guard caps the
      # *decompressed* size separately (``SEARCH_UTILS_MAX_DECOMPRESSED_BYTES``).
      #
      # Raise this only if legitimate render payloads (high-resolution frames,
      # large point clouds) can exceed 1 GiB on the wire; lowering it rejects
      # any frame above the limit.
      ws_max_size: 1073741824

    # -- (map)
    # @raw
    #
    # Dictionary of worker configurations, keyed by worker name. Each entry defines a dedicated worker deployment that processes plugin jobs. At least one entry is required for plugin workers to be scheduled.
    #
    # Each worker supports the following optional fields:
    #
    # - ``group`` *(string)* — group name assigned to this worker. Jobs submitted with a matching group name will only be routed to workers in that group.
    # - ``job_type`` *(list of strings)* — list of job item types this worker will process. If omitted, the worker processes all job types.
    # - ``pending_job_limit`` *(int)* — maximum number of pending rendering jobs allowed before a new rendering job is created for this worker. Overrides ``rendering_settings.pending_job_limit`` for this worker.
    # - ``retry_timeout_on_busy`` *(int)* — seconds to wait before retrying when the rendering service is busy. Overrides ``rendering_settings.retry_timeout_on_busy`` for this worker.
    #
    # @notationType -- yaml
    worker_config:
      bg: {}
      priority:
        group: priority-group
        pending_job_limit: 5
        retry_timeout_on_busy: 2
        job_type:
        - priority

    service:
      port: 8765
      schema: ws
      type: ClusterIP
      # ------------------------------------------
      #  NodePort configuration example
      # ------------------------------------------
      # type: nodeport
      # nodeport: 30507
      # ------------------------------------------
      #  Ingress service configuration example
      # ------------------------------------------
      # type: ingress
      # host: <my ingress host name>
      # path: "/"
      # ------------------------------------------
      #  Load Balancer service configuration example
      #  IMPORTANT: Selected Load Balancer type must support WebSockets.
      #    For example in the case of an AWS deployment "NLB" loadbalancer
      #    type would be a suitable option, while "ELB" loadbalancer type
      #    will not work.
      # ------------------------------------------
      #     type: loadbalancer
      # ------------------------------------------
      #  Additional service annotations
      #    * could be useful when setting type loadbalancer
      #    * when non provided - default service annotations defined in ``service.annotations`` will be used
      # ------------------------------------------
      #       annotations:
      #         service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      # ------------------------------------------
      # It is possible to provide an external endpoint URL with the provided values.
      # This could be useful if there is an alias pointing to the internal WS URL.
      # ------------------------------------------
      endpoint_override:
        enabled: false
        # host: ""
        # port: ""
        # schema: "ws"


    resources:
      requests:
        cpu: 0.5
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi

    # Configuration of the temporary directory for the service. By default it is
    # set to use Memory medium
    tmpDir:
      emptyDir: {}

    # Enable liveness check before container start-up. This liveness checks verifies that
    # all resources that microservice depends on a ready before initialization. These
    # resources include:
    #  * Redis
    #  * embedding inference service
    enableLivenessChecks: true

    # default resources for liveness check containers
    liveness_checks:
      resources:
        requests:
          cpu: 200m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 128Mi

    # metrics
    metrics:
      port: 8011

  # Service that writes processed data to the Search backend
  omni_writer:
    # number of replicas
    replicas: 1
    # resources for a single replica
    resources:
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        cpu: 1
        memory: 2Gi
    settings:
      n_concurrent_queue_workers: 2
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 5

    # Enable liveness check before container start-up. This liveness checks verifies that
    # all resources that microservice depends on a ready before initialization. These
    # resources include:
    #  * Redis
    #  * NGSearch storage service
    enableLivenessChecks: true

  info_endpoint:
    replicas: 1
    resources:
      requests:
        cpu: 0.5
        memory: 2Gi
      limits:
        # NOTE: here 2 CPUs are: 1 for the main python loop and the other one for prometheus metrics exporter
        cpu: 1
        # NOTE: this limit is set quite large by default, adjust it based on the
        #  Nucleus Server size the memory usage of the service starts to grow,
        #  when updates from the Nucleus server arrive faster than they are
        #  being processed
        memory: 4Gi

    service:
      type: ClusterIP
# ------------------------------------------
#  NodePort configuration example
# ------------------------------------------
      # type: nodeport
      # nodeport: 30550
# ------------------------------------------
#  Ingress service configuration example
# ------------------------------------------
      # type: ingress
      # host: <my ingress host name>
      # path: "/"

    # Enable liveness check before container start-up. This liveness checks verifies that
    # all resources that microservice depends on a ready before initialization. These
    # resources include:
    #  * Redis
    enableLivenessChecks: true

  # service for inference functionality
  embedding:
    replicas: 1
    deployment_strategy: RollingUpdate
    # By default the embedding pod runs the unified `siglip2-triton` image
    # (see `global.image.siglip2_triton`). Override here to pin a different
    # image for the embedding service only.
    image:
      name: ""
      tag: ""
    service:
      inference:
        type: ClusterIP

    triton_server:
      livenessProbe:
        httpGet:
          path: /v2/health/live
      readinessProbe:
        httpGet:
          path: /v2/health/ready
      presistence:
        enabled: False

    # affinity and tolerations specifically for the embedding service
    affinity: {}
    tolerations: []

    # Optional RuntimeClass for the embedding pod. Empty (default) leaves the
    # field unset so the cluster's default RuntimeClass applies. Set it (e.g.
    # "nvidia") to force a specific GPU RuntimeClass when multiple are defined
    # (see `kubectl get runtimeclass`).
    runtimeClassName: ""

    # ------------------------------------------
    #  Additional service annotations
    #    * could be useful when setting type loadbalancer
    #    * when non provided - default service annotations defined in ``service.annotations`` will be used
    # ------------------------------------------
    #         annotations:
    #           service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

    # Note: The embedding service requires ~3.5GB of RAM per worker. Set this parameter
    # according to available resources and expected load.

    default_workers_per_model: 2
    resources:
      requests:
        cpu: 2
        memory: 7Gi
        nvidia.com/gpu: 1
      limits:
        cpu: 4
        memory: 15Gi
        nvidia.com/gpu: 1

    # Configuration of the temporary directory for the service. By default it is
    # set to use Memory medium
    tmpDir:
      emptyDir:
        medium: Memory
        sizeLimit: 256Mi


    # if you have a GPU available on the Kubernetes cluster and you would like
    # embedding service to use it uncomment the following
    #
    #   requests: {nvidia.com/gpu: 1},
    #   limits: {nvidia.com/gpu: 1}
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
      averageCPUUtilization: 50

    # Pod security context configuration for the embedding service
    securityContext:
      # fsGroup: 1001
      runAsUser: 1001
      runAsNonRoot: true
      readOnlyRootFilesystem: true

  # metrics ports for the DeepSearch deployment
  metrics:
    omni_writer: 8013
    monitor_crawler: 8014


#
# Configuration of Redis the following Redis streams:
#   * Farm Job stream - stores plugin processing requests that require rendering
#   * Non Farm Job stream - stores plugin processing requests that do not require rendering
#   * Results stream - stores plugin processing results
#
# The parameters below regulate the number of retries for a given asset and
# timeouts of when the processing for the asset is considered to be failed and
# it needs to be re-claimed from the stream by a different worker.
#
cache_settings:
  farm_job_autoclaim_min_idle_time: "10800000"  # 3 hours (in milliseconds)
  non_farm_job_autoclaim_min_idle_time: "10800000" # 3 hours (in milliseconds)
  results_autoclaim_min_idle_time: "300000" # 5 minutes (in milliseconds)
  job_autoclaim_n_retries: "5"

imagePullPolicy: IfNotPresent
nameOverride: ""
fullnameOverride: ""

# override omni config
OVERRIDE_CONFIG: false

# create omniverse service user
CREATE_SERVICE_USER: false

# environment variables
env:
  # You can provide additional environment variables as follows
  #  - name: 'VARIABLE NAME'
  #    value: 'VARIABLE VALUE'

################################################################################
## Plugin configuration
################################################################################

# USD Search API service is built as a collection of plugins, each of which does a
# specific job. These plugins can be optionally activated and deactivated by
# modifying the following configuration and setting the ``active`` parameter of
# specific plugins to ``false``:


plugins:

    # -- (map)
    # @raw
    #
    # Construction of a scene graph for a given USD asset
    #
    # @notationType -- yaml
    asset_graph_generation:
      preview_name: ags
      type: asset_graph_generation
      active: True
      requires_embedding_service: False
      requires_ags_service: True
      requires_rendering: False
      vision_endpoint: {}

      # resource overrides
      resources:
        requests:
          cpu: 1
          memory: 3Gi
        limits:
          cpu: 1
          memory: 3Gi


      sidecar_containers:
      - name: kit-worker
        # By default the graph-builder sidecar runs the unified `rendering-job`
        # (Kit) image (see `global.image.rendering_job`) with `MODE=graph-builder`,
        # which selects the graph-builder code path inside the Kit image.
        # Override `name`/`tag` here to pin a different image.
        image:
          name: ""
          tag: ""
        command:
          - sh
          - -c
          - "python -m uvicorn graph_builder.service:app --host=0.0.0.0"
        env:
          - name: MODE
            value: graph-builder
        resources:
          requests:
            cpu: 4
            memory: 10Gi
          limits:
            cpu: 8
            memory: 10Gi
        securityContext:
          # fsGroup: 1000
          runAsUser: 1000
          runAsNonRoot: true
          # readOnlyRootFilesystem: true

    # -- (map)
    # @raw
    #
    # Generation of thumbnails for USD assets on Nucleus server based on the
    # rendered views received from the Omniverse Farm
    #
    # @notationType -- yaml
    thumbnail_generation:
      preview_name: thumb-gen
      type: thumbnail_generation
      active: True
      requires_embedding_service: False
      n_concurrent_queue_workers: 256
      requires_rendering: True
      useRenderingServiceAccount: True
      requires_vision_metadata: False
      extra_env:
        REMOVE_EXISTING_THUMBNAILS: "true"
        SKIP_OMNI_WRITES: "false"
      vision_endpoint: {}

    # -- (map)
    # @raw
    #
    # Rendering USD assets from multiple views and
    # extraction of CLIP embeddings from each view to better characterize
    # the asset
    #
    # @notationType -- yaml
    rendering_to_embedding:
      preview_name: render-emb
      type: rendering_to_embedding
      active: True
      requires_embedding_service: True
      n_concurrent_queue_workers: 256
      requires_rendering: True
      useRenderingServiceAccount: True
      requires_vision_metadata: False
      vision_endpoint: {}

    # -- (map)
    # @raw
    #
    # Extraction of CLIP embeddings from thumbnails of assets that are found on the Storage backend. GIF thumbnails are also supported — GIF files are split into multiple frames by sampling every Nth frame (default: every frame), capped at a maximum number of frames (default: ``512``), configurable via the optional ``gif_sampling_mode`` (``fixed`` = every Nth frame, or ``uniform`` = ``gif_max_frames`` frames spread evenly across the GIF), ``gif_frame_sample_frequency``, and ``gif_max_frames`` parameters. Please refer to the [Thumbnail indexing settings](#thumbnail-indexing-settings) section for more information on how to configure the service to read GIF thumbnails.
    #
    # @notationType -- yaml
    thumbnail_to_embedding:
      preview_name: thumb-emb
      type: thumbnail_to_embedding
      active: True
      requires_thumbnail_settings: True
      requires_embedding_service: True
      requires_rendering: False
      requires_vision_metadata: False
      n_concurrent_queue_workers: 5
      vision_endpoint: {}
      # gif_sampling_mode: fixed  # "fixed" (every Nth frame) or "uniform" (gif_max_frames frames spread evenly)
      # gif_frame_sample_frequency: 1
      # gif_max_frames: 512

    # -- (map)
    # @raw
    #
    # Extraction of CLIP embeddings from images. The following image types are
    # supported:
    #  * all the formats supported by PIL library
    #  * EXR
    #  * GIF
    #
    # __NOTE__: GIF files are split into multiple frames by sampling every Nth frame (default: every frame), capped at a maximum number of frames (default: ``512``). Sampling can be customized via the optional ``gif_sampling_mode`` (``fixed`` = every Nth frame, or ``uniform`` = ``gif_max_frames`` frames spread evenly across the GIF), ``gif_frame_sample_frequency``, and ``gif_max_frames`` parameters.
    #
    # @notationType -- yaml
    image_to_embedding:
      preview_name: img-emb
      type: image_to_embedding
      active: True
      requires_embedding_service: True
      requires_rendering: False
      requires_vision_metadata: False
      vision_endpoint: {}
      # gif_sampling_mode: fixed  # "fixed" (every Nth frame) or "uniform" (gif_max_frames frames spread evenly)
      # gif_frame_sample_frequency: 1
      # gif_max_frames: 512
      # resource overrides
      resources:
        requests:
          cpu: 1
          memory: 2Gi
        limits:
          cpu: 1
          memory: 4Gi

    # -- (map)
    # @raw
    #
    # Generation of Vision metadata from Images. The following image types are
    # supported:
    #  * all the formats supported by PIL library
    #  * EXR
    #  * GIF
    #
    # __NOTE__: GIF files are split into multiple frames by sampling every Nth frame (default: every frame), capped at a maximum number of frames (default: ``512``). Sampling can be customized via the optional ``gif_sampling_mode`` (``fixed`` = every Nth frame, or ``uniform`` = ``gif_max_frames`` frames spread evenly across the GIF), ``gif_frame_sample_frequency``, and ``gif_max_frames`` parameters.
    #
    # @notationType -- yaml
    image_to_vision_metadata:
      preview_name: img-vis-meta
      type: image_to_vision_metadata
      active: False
      requires_embedding_service: False
      requires_rendering: False
      requires_vision_metadata: True
      vision_endpoint: {}
      # gif_sampling_mode: fixed  # "fixed" (every Nth frame) or "uniform" (gif_max_frames frames spread evenly)
      # gif_frame_sample_frequency: 1
      # gif_max_frames: 512

    # -- (map)
    # @raw
    #
    # Generation of Vision metadata from Renderings.
    #
    # @notationType -- yaml
    rendering_to_vision_metadata:
      preview_name: render-vis-meta
      type: rendering_to_vision_metadata
      active: False
      requires_embedding_service: False
      n_concurrent_queue_workers: 256
      requires_rendering: True
      useRenderingServiceAccount: True
      requires_vision_metadata: True
      vision_endpoint: {}

    # -- (map)
    # @raw
    #
    # Generation of Vision metadata from thumbnails of assets stored on the Storage backend. GIF thumbnails are also supported — GIF files are split into multiple frames by sampling every Nth frame (default: every frame), capped at a maximum number of frames (default: ``512``), configurable via the optional ``gif_sampling_mode`` (``fixed`` = every Nth frame, or ``uniform`` = ``gif_max_frames`` frames spread evenly across the GIF), ``gif_frame_sample_frequency``, and ``gif_max_frames`` parameters. Please refer to the [Thumbnail indexing settings](#thumbnail-indexing-settings) section for more information on how to configure the service to read GIF thumbnails.
    #
    # @notationType -- yaml
    thumbnail_to_vision_metadata:
      preview_name: thumb-vis-meta
      type: thumbnail_to_vision_metadata
      active: False
      requires_thumbnail_settings: True
      requires_embedding_service: False
      requires_rendering: False
      requires_vision_metadata: True
      vision_endpoint: {}
      # gif_sampling_mode: fixed  # "fixed" (every Nth frame) or "uniform" (gif_max_frames frames spread evenly)
      # gif_frame_sample_frequency: 1
      # gif_max_frames: 512

##############################################
## Cache settings
##############################################
persistence:
  pvc:
    createPvc: false
    size: 50Gi
    storageClassName: ""
  type: emptyDir
  # persistentVolumeClaim:
  #   claimName: ""
  emptyDir:
    sizeLimit: 10Gi
  hostPath:
    path: /var/lib/omni/cache
    type: Directory

##############################################
## Ingress set-up
##############################################
#
# If any of the service endpoint had ingress type you need to additionally
# set ingress.enabled parameter from below to "true".

ingress:
  enabled: false
  annotations:
    ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"

# set-up metrics backend
metrics:
  enabled: true

# resources for the deployment
resources: {}

# # ------- END ----------------------------------------
# # ----------------------------------------------------

## Account to use
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

## Account to use for the rendering jobs
renderingJobServiceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

## Account to use for the rendering jobs
listerJobServiceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

rbac:
  create: true

# service port that is used for testing
test_service:
  port: 8080

loggingConfig:
  version: 1
  disable_existing_loggers: False
  filters: {}
  formatters:
    default:
      format: '%(levelname)s %(asctime)s %(name)s - %(message)s'
  handlers:
    default:
      formatter: default
      class: logging.StreamHandler
      stream: ext://sys.stderr
  loggers:
    opensearch:
      level: ERROR
    search_utils.cache_utils:
      level: WARNING
    httpx:
      level: WARNING
    root:
      level: INFO
#      level: DEBUG
      handlers:
        - default

################################################################################
## Security Context configuration
################################################################################

podSecurityContext:
  fsGroup: 1001
  runAsUser: 1001
  runAsNonRoot: true

securityContext:
  readOnlyRootFilesystem: true

################################################################################
## END
################################################################################
