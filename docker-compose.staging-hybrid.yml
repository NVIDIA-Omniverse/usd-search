# Overlay: proxy ALL API to the public staging deepsearch-horde instance
# (http://api.staging.deepsearch-horde.nvidia.com) and serve our redesigned
# Explorer on top. That instance has a fully working search + Asset Graph Service
# (graphs/dependencies/downloads all functional, public, no auth), so this is the
# simplest way to get the redesigned UI showing real dependency graphs. Only two
# local containers are needed: explorer + gateway (no local deepsearch-api /
# opensearch / siglip2 / AGS).
#
# Bring up (Explorer UI at http://localhost:8080/ui/):
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.web-ui.yml \
#     -f docker-compose.staging-hybrid.yml \
#     up -d --no-build explorer gateway
services:
  gateway:
    volumes: !override
      - ./infra/quickstart/gateway.staging-hybrid.conf:/etc/nginx/conf.d/default.conf:ro
      - ./helm/usdsearch/docs/index.html:/usr/share/nginx/docs/index.html:ro
      - ./helm/usdsearch/docs/openapi.json:/usr/share/nginx/docs/openapi.json:ro
    # Only the Explorer is a real local dependency; the API surface is remote.
    depends_on: !override
      explorer:
        condition: service_healthy
