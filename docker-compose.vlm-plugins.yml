# VLM Plugin Workers — optional overlay for vision-language model metadata generation.
#
# Adds workers that call external VLM APIs (OpenAI, NIM, Anthropic, etc.) to
# generate rich metadata (descriptions, tags) from images/thumbnails/renderings.
#
# No local GPU required — VLM inference happens on the remote API.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.vlm-plugins.yml up
#
# With GPU rendering (for rendering_to_vision_metadata):
#   docker compose -f docker-compose.yml -f docker-compose.gpu-plugins.yml -f docker-compose.vlm-plugins.yml up
#
# Required environment variables (set in .env or shell):
#   USDSEARCH_LLM_API_KEY  — the one shared LLM key. Every LLM role (metadata
#   generation, validation) reuses it; there is no per-provider or per-role key
#   to set. Optional overrides:
#     USDSEARCH_LLM_BASE_URL            (defaults to the shipped OpenAI-compatible endpoint)
#     USDSEARCH_VISION_METADATA_MODEL   (default gcp/google/gemini-3.1-pro-preview)
#     USDSEARCH_VISION_VALIDATION_MODEL (default gcp/google/gemini-3.5-flash)

# Shared LLM connection — null-pass-through (`KEY:` with no value): forwards the
# var from the host if set, omits it from the container otherwise. Read once by
# llm_client.LLMConnectionConfig and reused by the metadata workers and
# deepsearch-api's validation path. Point BASE_URL at any OpenAI-compatible endpoint.
x-vlm-provider-env: &vlm-provider-env
  USDSEARCH_LLM_API_KEY:
  USDSEARCH_LLM_BASE_URL:

x-vlm-worker-env: &vlm-worker-env
  # Storage backend — overridable from the host shell (kept in sync with the
  # main compose's x-common-env so /quickstart settings reach VLM workers too).
  STORAGE_BACKEND_TYPE: ${STORAGE_BACKEND_TYPE:-s3}
  S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-omniverse-content-production}
  S3_STORAGE_REGION_NAME: ${S3_STORAGE_REGION_NAME:-us-west-2}
  # Null-pass-through for storage credentials — see the comment on
  # x-vlm-provider-env above. Required for anonymous public-bucket access:
  # pydantic-settings reads an empty-string env var as `""` (not `None`),
  # which prevents the S3 client from registering `disable_signing`.
  S3_STORAGE_AWS_ACCESS_KEY_ID:
  S3_STORAGE_AWS_SECRET_ACCESS_KEY:
  S3_STORAGE_AWS_ENDPOINT_URL:
  OV_SERVER:
  OV_USERNAME:
  OV_PASSWORD:
  # Storage API backend (STORAGE_BACKEND_TYPE=storage_api) — null-pass-through,
  # kept in sync with x-common-env so VLM workers reach the same gRPC endpoint.
  STORAGE_API_GRPC_ENDPOINT:
  STORAGE_API_BASE_URI:
  STORAGE_API_TOKEN:
  STORAGE_API_SSL:
  STORAGE_API_OPENID_CLIENT_ID:
  STORAGE_API_OPENID_CLIENT_SECRET:
  STORAGE_API_OPENID_TOKEN_URL:
  STORAGE_API_OPENID_SCOPE:
  STORAGE_API_OPENID_GRANT_TYPE:
  LOGGING_CONFIG: /logging.yml
  PYTHONUNBUFFERED: "1"
  REDIS_URL: redis://redis:6379
  OTEL_SDK_DISABLED: "true"
  # Per-role model override (optional; default gcp/google/gemini-3.1-pro-preview).
  USDSEARCH_VISION_METADATA_MODEL:
  <<: *vlm-provider-env

services:
  # ─── DeepSearch API: enable VLM validation ──────────────────────────────
  # Flips the base compose's validation-disabled default and supplies the same
  # shared LLM connection the metadata workers use, so the
  # `/vlm_validate/...` endpoints can call out to the VLM. The validation config
  # (`services/deepsearch_api/.../validation/config.py`) reads the
  # `USDSEARCH_VISION_VALIDATION_*` env vars below (model defaults to
  # gcp/google/gemini-3.5-flash).
  deepsearch-api:
    environment:
      <<: *vlm-provider-env
      USDSEARCH_VISION_VALIDATION_ENABLED: "true"
      USDSEARCH_VISION_VALIDATION_MAX_CONCURRENT: ${USDSEARCH_VISION_VALIDATION_MAX_CONCURRENT:-30}
      USDSEARCH_VISION_VALIDATION_MODEL:
      # LLM query parsing (`/llm_parse/*`) on the same
      # shared connection. Model defaults to llm_parse/config.py's value; the
      # null pass-through forwards USDSEARCH_LLM_PARSING_MODEL from the host if
      # set and omits it otherwise.
      USDSEARCH_LLM_PARSING_ENABLED: "true"
      USDSEARCH_LLM_PARSING_MODEL:
      # Optional corpus grounding for the parser's `usd_property` filter: point
      # at a `usd_property_catalog.yaml` (see docs/usd-property-catalog.md) and
      # bind-mount the file via a local overlay. Null pass-through as above.
      USDSEARCH_LLM_PARSING_PROPERTY_CATALOG_FILEPATH:

  # ─── VLM Metadata Workers (CPU-only, call remote VLM APIs) ───────────────

  monitor-worker-image-to-vision-metadata:
    image: usdsearch:latest
    container_name: usdsearch-worker-img2meta
    restart: unless-stopped
    command: ["python", "-m", "monitor.src.monitor_worker", "--plugin_name=image_to_vision_metadata"]
    environment:
      <<: *vlm-worker-env
      DEEPSEARCH_MONITOR_WORKER_CONFIG_PLUGIN_NAME: image_to_vision_metadata
      DEEPSEARCH_MONITOR_WORKER_CONFIG_JOB_ITEM_TYPE: '["priority","normal","none"]'
    depends_on:
      redis:
        condition: service_healthy

  monitor-worker-thumbnail-to-vision-metadata:
    image: usdsearch:latest
    container_name: usdsearch-worker-thumb2meta
    restart: unless-stopped
    command: ["python", "-m", "monitor.src.monitor_worker", "--plugin_name=thumbnail_to_vision_metadata"]
    environment:
      <<: *vlm-worker-env
      DEEPSEARCH_MONITOR_WORKER_CONFIG_PLUGIN_NAME: thumbnail_to_vision_metadata
      DEEPSEARCH_MONITOR_WORKER_CONFIG_JOB_ITEM_TYPE: '["priority","normal","none"]'
    depends_on:
      redis:
        condition: service_healthy

  # NOTE: rendering_to_vision_metadata requires both the rendering service (from
  # docker-compose.gpu-plugins.yml) AND a VLM API. Only include this overlay
  # together with gpu-plugins if you need this worker.
  monitor-worker-rendering-to-vision-metadata:
    image: usdsearch:latest
    container_name: usdsearch-worker-rend2meta
    restart: unless-stopped
    command: ["python", "-m", "monitor.src.monitor_worker", "--plugin_name=rendering_to_vision_metadata"]
    environment:
      <<: *vlm-worker-env
      DEEPSEARCH_MONITOR_WORKER_CONFIG_PLUGIN_NAME: rendering_to_vision_metadata
      DEEPSEARCH_MONITOR_WORKER_CONFIG_JOB_ITEM_TYPE: '["priority","normal","none"]'
      DEEPSEARCH_RENDERER_CONFIG_RENDERER_TYPE: rendering_service
      DEEPSEARCH_RENDERER_CONFIG_RENDERING_SERVICE_URL: http://rendering-job:8000
    depends_on:
      redis:
        condition: service_healthy
