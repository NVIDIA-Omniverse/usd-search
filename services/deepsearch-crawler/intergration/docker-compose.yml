services:
  crawler:
    image: nvcr.io/m3sujtetvf5w/usdsearch/deepsearch-crawler:1.3.7
    container_name: crawler
    environment:
      - REDIS_STREAM_URL=redis://redis:6379
      # storge API settings
      - STORAGE_API_GRPC_ENDPOINT=${STORAGE_API_GRPC_ENDPOINT:-""}
      - STORAGE_API_BASE_URI=${STORAGE_API_BASE_URI:-""}
      - STORAGE_API_SSL=${STORAGE_API_SSL:-true}
      - STORAGE_BACKEND_TYPE=${STORAGE_BACKEND_TYPE}
      # Nucleus settings
      - OV_USERNAME=${OV_USERNAME:-""}
      - OV_PASSWORD=${OV_PASSWORD:-""}
      - OV_SERVER=${OV_SERVER:-""}
    depends_on:
      - redis

  redis:
    image: redis:latest
    command: [ "redis-server", "--databases", "32" ]
    container_name: redis
