[project]
name = "storage-api"
version = "0.1.0"
description = "Generated Python gRPC client for the Omniverse Storage API and Notifications Consumer API"
authors = [
    {name = "Artem Rozantsev", email = "arozantsev@nvidia.com"},
]
readme = "README.md"
requires-python = ">=3.10,<4.0"
dependencies = [
    "grpcio>=1.72.0",
    "protobuf>=6.32.1",
]

[dependency-groups]
dev = [
    "grpcio-tools>=1.72.0",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nvidia"]
