[project]
name = "llm-client"
dynamic = ["version"]
description = "Lean OpenAI-compatible LLM/VLM client for USD Search: one shared Inference Hub connection, per-role models, plus metadata-generation and validation helpers."
authors = [
    {name = "Nikola Spasojevic", email = "nspasojevic@nvidia.com"},
]
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "langchain>=1.3.4",
    "langchain-core>=1.4.0",
    "langchain-classic>=1.0.0",
    "langchain-openai>=1.1.0",
    # transitively present via langchain-openai; declared because client.py imports it
    "openai>=2.0",
    "pydantic-settings>=2.6.1",
    "pydantic>=2.10.5",
    "pyyaml>=6.0",
    "backoff>=2.2.1",
    "pillow>=10.0.0",
]

[project.optional-dependencies]
langfuse = [
    "langfuse>=3.2.2",
]

[dependency-groups]
test = [
    "pytest>=8.1.1",
    "pytest-asyncio>=0.21.0",
    "pytest-xdist>=3.8.0",
    "pytest-cov>=6.2.1",
    "pytest-timeout>=2.1.0",
    "pytest-rerunfailures>=14.0",
    "pillow>=10.0.0",
]
lint = [
    "black>=25.11.0",
    "isort>=7.0.0",
    "pylint>=2.15.10",
    "mypy>=0.991",
    "pycodestyle>=2.11.1",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.uv-dynamic-versioning]
enable = true
vcs = "git"
pattern = "default-unprefixed"
fallback-version = "0.1.0"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.black]
line-length = 120
target-version = ['py310']

[tool.isort]
profile = "black"
treat_all_comments_as_code = true

[tool.mypy]
ignore_missing_imports = true
