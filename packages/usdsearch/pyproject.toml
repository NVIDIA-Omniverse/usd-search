[project]
name = "usdsearch"
dynamic = ["version"]
description = "Admin and operational utilities for the usdsearch mono repo"
authors = [
    {name = "Artem Rozantsev", email = "arozantsev@nvidia.com"},
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "redis>=4.5.0",
    "fire>=0.6.0",
    "httpx>=0.27.0",
    "tenacity>=8.2.3",
    "humanize>=4.11.0",
    "tqdm>=4.64.1",
    "search-utils",
    "ngsearch-cache",
    "ngsearch-info-endpoint",
]

[tool.uv]
package = true

[tool.uv.sources]
search-utils = { workspace = true }
ngsearch-cache = { workspace = true }
ngsearch-info-endpoint = { workspace = true }

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.uv-dynamic-versioning]
enable = true
vcs = "git"
pattern = "default-unprefixed"
fallback-version = "0.1.0"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.hatch.build.targets.wheel]
packages = ["usdsearch"]
