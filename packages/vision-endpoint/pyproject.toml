[project]
name = "vision-endpoint"
dynamic = ["version"]
description = "Vision AI utilities: VLMs, embeddings, metadata generation, CLIP/SigLIP2 Triton clients"
authors = [
    {name = "Nikola Spasojevic", email = "nspasojevic@nvidia.com"},
]
readme = "README.md"
requires-python = ">=3.10,<4.0"
dependencies = [
    "langchain>=1.1.0",
    "langchain-core>=1.4.0",
    "langchain-classic>=1.0.0",
    "langchain-openai>=1.1.0",
    "langchain-anthropic>=1.1.0",
    "langchain-mistralai>=0.2.0",
    "pydantic-settings>=2.6.1",
    "pydantic>=2.10.5",
    "httpx>=0.27.0",
    "distro>=1.9.0",
    "tqdm",
    "h11>=0.14.0",
    "backoff>=2.2.1",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
siglip2 = [
    "siglip2-triton-client>=0.6.0",
    "pillow>=10.0.0",
    "transformers>=5.0.0",
]
langfuse = [
    "langfuse>=3.2.2",
]

[dependency-groups]
test = [
    "pytest>=8.1.1",
    "pytest-asyncio>=0.21.0",
    "pytest-xdist>=3.8.0",
    "pytest-cov>=6.2.1",
    "pytest-timeout>=2.1.0",
    "pillow>=10.0.0",
    "backoff>=2.2.1",
    "transformers>=5.0.0",
    "pandas>=2.2.3",
    "jinja2>=3.1.2",
    "matplotlib>=3.8.0",
]
lint = [
    "black>=25.11.0",
    "isort>=7.0.0",
    "pylint>=2.15.10",
    "mypy>=0.991",
    "pycodestyle>=2.11.1",
]
dev = [
    "ipykernel>=6.29.5",
]

[tool.uv]
package = true

[tool.uv.sources]
siglip2-triton-client = { workspace = true }

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.uv-dynamic-versioning]
enable = true
vcs = "git"
pattern = "default-unprefixed"
fallback-version = "0.1.0"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.black]
line-length = 120
target-version = ['py310']

[tool.isort]
profile = "black"
treat_all_comments_as_code = true

[tool.mypy]
ignore_missing_imports = true
