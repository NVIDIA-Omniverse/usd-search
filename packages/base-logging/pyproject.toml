[project]
name = "base-logging"
version = "0.1.0"
description = "Shared logging configuration loader for USD Search services"
requires-python = ">=3.11,<3.14"
dependencies = [
    "pyyaml>=6.0",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["base_logging"]
