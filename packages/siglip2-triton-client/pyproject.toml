[project]
name = "siglip2-triton-client"
version = "0.6.1"
description = "SigLIP2 Triton inference client — async gRPC client with text tokenizer for client-side tokenization"
authors = [
    {name = "Nikola Spasojevic", email = "nspasojevic@nvidia.com"},
]
readme = "README.md"
requires-python = ">=3.10,<4.0"
dependencies = [
    "numpy>=1.23.5",
    "pydantic>=2.0",
    "pydantic-settings>=2.6.1",
    "tritonclient[grpc]>=2.41.0",
    "protobuf>=6.30.2",
    "grpcio>=1.53.0",
    "tokenizers>=0.21.0",
]

[project.optional-dependencies]
preprocessing = [
    "transformers>=4.57.1",
    "pillow>=12.0.0",
]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-xdist>=3.0.0",
    "pytest-timeout>=2.0.0",
    "pytest-cov>=4.0.0",
    "pytest-rerunfailures>=11.1.2",
    "pillow>=12.0.0",
    "greenlet>=3.3.0",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["siglip2_triton_client"]
