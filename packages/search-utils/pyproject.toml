[project]
name = "search-utils"
dynamic = ["version"]
description = "Collection of Utility functions for DeepSearch project"
authors = [
    {name = "Artem Rozantsev", email = "arozantsev@nvidia.com"},
    {name = "Rafal Wytrykus", email = "rwytrykus@nvidia.com"},
    {name = "Nikola Spasojevic", email = "nspasojevic@nvidia.com"},
]
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "base-logging",
    "numpy>=1.22.3",
    "aiohttp>=3.8.1",
    "websockets>=10",
    "redis[hiredis]>=5.0.4",
    "xxhash>=3.1.0",
    "orjson>=3.9.15",
    "aioboto3>=11.0.0",
    "psutil>=5.8.0",
    "prometheus-client>=0.11.0",
    "pyyaml>=6.0",
    "python-dateutil>=2.8.2",
    "pydantic>=2.0",
    "yarl>=1.7.2",
    "multidict>=6.0.2",
"envyaml>=1.10.211231",
    "python-json-logger>=2.0.7",
    "opentelemetry-api>=1.25.0",
    "opentelemetry-sdk>=1.25.0",
    "deprecated>=1.2.14",
    "importlib-metadata>=7.1",
    "cffi>=1.16.0",
    "pydantic-settings>=2.6.1",
    "fire>=0.7.0",
    "humanize>=4.11.0",
    "python-dotenv>=1.0.1",
    "elastic-transport>=8.17.0",
    "sniffio>=1.3.1",
    "httpcore>=1.0.7",
    "grpcio>=1.72.0",
    "urllib3>=2.7.0"
]

[project.optional-dependencies]
search-backend = [
    "opensearch-py>=3.0.0",
    "elasticsearch>=8.10.0",
]
pillow = ["pillow>=10.0.1"]
storage-api = [
    "storage-api",
    "authlib>=1.7.2",
    "httpx>=0.27.2",
]
tools = ["tqdm>=4.64.1"]

[dependency-groups]
lint = [
    "black>=22.12.0",
    "isort>=5.11.4",
    "pylint>=2.15.10",
    "mypy>=0.991",
    "types-deprecated>=1.2.9.2",
    "types-pillow>=9.5.0.2",
    "types-pyyaml>=6.0.12.9",
    "types-psutil>=5.9.5.12",
    "types-python-dateutil>=2.8.19.12",
    "types-redis>=4.5.4.1",
    "types-requests>=2.28.11.17",
    "types-setuptools>=67.7.0.0",
    "types-urllib3>=1.26.25.11",
    "types-boto3>=1.0.2",
    "types-aiobotocore-support>=2.5.0.post1",
    "types-orjson>=3.6.2",
]
test = [
    "pytest>=8.4.1,<10",
    "pytest-asyncio>=0.20.2",
    "pytest-timeout>=2.1.0",
    "pytest-cov>=4.0.0",
    "coverage>=7.2.4",
    "pytest-xdist>=3.2.1",
    "pytest-rerunfailures>=11.1.2",
    "anybadge>=1.14.0",
    "coverage-badge>=1.1.0",
    "llm-client",
    "pytest-forked>=1.6.0",
]
dev = [
    "grpcio-tools>=1.73.0",
]

[tool.uv]
package = true

[tool.uv.sources]
storage-api = { workspace = true }

[build-system]
requires = ["hatchling<1.28", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.uv-dynamic-versioning]
enable = true
vcs = "git"
pattern = "default-unprefixed"
fallback-version = "0.1.0"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.hatch.build.targets.wheel]
ignore-vcs = true
# NOTE: the `_build/*` trees are brought in exclusively via
# `[tool.hatch.build.targets.wheel.force-include]` below (then re-rooted by
# `[...wheel.sources]`). Do NOT also list them here — newer hatchling rejects
# the resulting duplicate archive paths ("A second file is being added ...").
only-include = [
    "search_utils",
]

[tool.hatch.build.targets.wheel.force-include]
"_build/discovery.client.py/omni" = "_build/discovery.client.py/omni"
"_build/idl.py/idl" = "_build/idl.py/idl"
"_build/omniverse_connection/omni" = "_build/omniverse_connection/omni"
"_build/omniverse.auth.client.py/omni" = "_build/omniverse.auth.client.py/omni"
"_build/tag_idl_client/omni" = "_build/tag_idl_client/omni"

[tool.hatch.build.targets.wheel.sources]
"_build/discovery.client.py/omni" = "omni"
"_build/idl.py/idl" = "idl"
"_build/omniverse_connection/omni" = "omni"
"_build/omniverse.auth.client.py/omni" = "omni"
"_build/tag_idl_client/omni" = "omni"
search_utils = "search_utils"

[tool.black]
line-length = 120
target-version = ['py39']

[tool.isort]
profile = "black"
treat_all_comments_as_code = true

[tool.mypy]
ignore_missing_imports = "True"

exclude = [
    "package-links",
    "_build"
]

# Disallow dynamic typing
disallow_any_unimported = "True"
disallow_any_decorated = "True"
disallow_any_generics = "True"
disallow_any_explicit = "True"
disallow_subclassing_any = "True"

# Disallow untyped definitions and calls
disallow_untyped_calls = "True"
disallow_untyped_defs = "True"
disallow_incomplete_defs = "True"
check_untyped_defs = "True"
disallow_untyped_decorators = "True"

# None and optional handling
no_implicit_optional = "True"

# Configuring warnings
warn_unused_ignores = "True"
warn_no_return = "True"
warn_return_any = "True"
warn_redundant_casts = "True"

# Misc things
strict_equality = "True"

# Config file
warn_unused_configs = "True"
