[project]
name = "deepsearch-utils"
dynamic = ["version"]
description = "DeepSearch plugin support utilities — farm client, rendering, storage helpers"
authors = [
    {name = "Artem Rozantsev", email = "arozantsev@nvidia.com"},
    {name = "Rafal Wytrykus", email = "rwytrykus@nvidia.com"},
    {name = "Nikola Spasojevic", email = "nspasojevic@nvidia.com"},
]
readme = "README.md"
requires-python = ">=3.10,<4.0"
dependencies = [
    "search-utils[search-backend,storage-api]",
    "ngsearch-storage",
    "vision-endpoint>=0.12.0",
    "numpy>=1.26.4,<2",
    "pillow>=10.2.0",
    "opentelemetry-api>=1.25.0",
    "opentelemetry-sdk>=1.25.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.6.1",
    "orjson>=3.9.0",
    "httpx>=0.27.0",
    "prometheus-client>=0.11.0",
    "websockets~=10.4",
    "pytinyexr>=0.9.1; sys_platform == 'linux'",
    "async-lru>=2.0.4",
    "kubernetes-asyncio>=29.0.0",
    "pyyaml>=6.0.2",
    "typing-extensions>=4.9.0",
]

[dependency-groups]
test = [
    "pytest>=7.3.1",
    "pytest-asyncio~=0.21.0",
    "pytest-timeout>=2.1.0",
    "pytest-forked>=1.6.0",
    "pytest-rerunfailures>=11.1.2",
    "pytest-xdist>=3.2.1",
    "pytest-coverage>=0.0",
    "coverage>=7.2.3",
    "anybadge>=1.14.0",
    "coverage-badge>=1.1.0",
    "nest-asyncio>=1.5.6",
]

[tool.uv]
package = true

[tool.uv.sources]
search-utils = { workspace = true }
ngsearch-storage = { workspace = true }

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.uv-dynamic-versioning]
enable = true
vcs = "git"
pattern = "default-unprefixed"
fallback-version = "0.1.0"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.hatch.build.targets.wheel]
packages = ["deepsearch_utils"]

