# Sample Explorer WebUI stack — one-command bring-up.
#
# From the repo root:
#   docker compose -f infra/compose/dev-stack.yml up --build
#
# Then open http://localhost:3000 — the Explorer's nginx reverse-proxies
# /api/* to the deepsearch-api container at the same origin.
#
# Defaults are tuned for "show me the UI working" — the API runs in
# MOCK_EMBEDDING mode and the opensearch-loader service seeds OpenSearch
# with the in-repo test fixtures (services/deepsearch_api/tests/opensearch-data).

include:
  - opensearch.yml
  - deepsearch-api.yml
  - explorer.yml
