services:
  deepsearch-crawler:
    image: ${USDSEARCH_IMAGE:-usdsearch:latest}
    build:
      context: ../../
      dockerfile: docker/Dockerfile.usdsearch
    container_name: deepsearch-crawler
    command: ["python", "-m", "deepsearch_crawler.main"]
    network_mode: host
    environment:
      - ACCEPT_EULA=Y
      - OV_SERVER=${OV_SERVER:-rc-r15.ov.nvidia.com}
      - OV_USERNAME=${OV_USERNAME:-}
      - OV_PASSWORD=${OV_PASSWORD:-}
      # host-mapped ports: redis.yml exposes 6380:6379, storage-apis.yml exposes 50051:50051
      - REDIS_URL=redis://localhost:6380
      - REDIS_STREAM_URL=redis://localhost:6380
      - CACHE_URI=redis://localhost:6380
      - CACHE_URL=redis://localhost:6380
      - STORAGE_API_GRPC_ENDPOINT=localhost:50051
      - DEEPSEARCH_CRAWLER_PATH=/Projects
      - LOGGING_CONFIG=/logging.yml
    volumes:
      - ../../logging.yml:/logging.yml:ro
    depends_on:
      redis:
        condition: service_started
      storage-api:
        condition: service_healthy
