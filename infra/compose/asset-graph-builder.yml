services:
  # Kit-worker — built from docker/Dockerfile.kit (unified Kit image shared with rendering-job).
  # Run with MODE=graph-builder to start the graph-builder FastAPI service.
  # Layer asset-graph-service.yml and minio.yml alongside this file,
  # then add asset-graph-builder.deps.yml to wire up the service dependencies.
  kit-worker:
    build:
      context: ../../services/rendering-job
      dockerfile: ../../docker/Dockerfile.kit
      additional_contexts:
        graph-builder: ../../services/asset-graph-builder
      # Runtime user baked into the image. Defaults match docker/Dockerfile.kit
      # (the base image's `ubuntu`); override to exercise the graph-builder with
      # a different container user, e.g. the NVPark settings:
      #   KIT_USER_ID=27489 KIT_GROUP_ID=27489 KIT_USER_NAME=appuser \
      #     ci/asset-graph-builder/run_tests_asset_graph_builder.sh
      args:
        USER_ID: ${KIT_USER_ID:-1000}
        GROUP_ID: ${KIT_GROUP_ID:-1000}
        USER_NAME: ${KIT_USER_NAME:-ubuntu}
    container_name: kit-worker
    ports:
      - "8100:8000"
    environment:
      MODE: graph-builder
      ACCEPT_EULA: "Y"
      TEST_GRAPH_BUILDER: "True"
      AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
      AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
      OV_SERVER: ${OV_SERVER:-localhost}
      OV_USERNAME: ${OV_USERNAME:-}
      OV_PASSWORD: ${OV_PASSWORD:-}
      NUCLEUS_ACCESS_TOKEN_VDC_SAMPLE: ${NUCLEUS_ACCESS_TOKEN_VDC_SAMPLE:-undefined}
      MINIO_ENDPOINT: http://minio:9000
      GITLAB_CI: ${GITLAB_CI:-false}
      USE_SEMANTICS_API: ${USE_SEMANTICS_API:-True}
      INDEXED_PROPERTY_PREFIXES: "semantic:,isaac:,physics:"
      SEVAN_TOKEN_URL: ${SEVAN_TOKEN_URL:-}
      SEVAN_DEV_SCOPE: ${SEVAN_DEV_SCOPE:-}
      SEVAN_DEV_CLIENT_SECRET: ${SEVAN_DEV_CLIENT_SECRET:-}
      SEVAN_DEV_CLIENT_ID: ${SEVAN_DEV_CLIENT_ID:-}
