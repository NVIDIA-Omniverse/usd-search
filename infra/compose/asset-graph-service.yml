services:
  # Asset Graph Service — built from the unified docker/Dockerfile.
  # neo4j (from neo4j.yml) must be included alongside this file.
  asset-graph-service:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.usdsearch
    container_name: asset-graph-service
    command: ["uvicorn", "asset_graph_service.api:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DB_URI: neo4j://neo4j:7687
      DB_USERNAME: neo4j
      DB_PASSWORD: password
      N_WORKERS: 1
      ACCEPT_EULA: "Y"
      OTEL_SDK_DISABLED: "true"
    ports:
      - "8101:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
