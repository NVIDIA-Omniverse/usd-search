services:
  storage-api:
    # image: nvcr.io/omniverse/deeptag-internal/storage-api-local-filesystem:0.14.0
    # image: gitlab-master.nvidia.com:5005/omniverse/deeptag/ci-cd-storage-backends/sample-storage-api:0.0.2
    image: nvcr.io/omniverse/deeptag-internal/sample-storage-api:0.0.2
    container_name: storage-api-local-filesystem
    environment:
      - FILESERVICE_STATIC_DIR=/data
    # volumes:
    #   - ${PWD}/_data:/data
    ports:
    - "8011:8011"
    - "50051:50051"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r = requests.get('http://localhost:8011/v1alpha/fileobject/docs'); r.raise_for_status()"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
