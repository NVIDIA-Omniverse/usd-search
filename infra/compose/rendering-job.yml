services:
  # Rendering service — built from docker/Dockerfile.kit.
  # Runs as a FastAPI service; also used as the test-runner container via `docker compose run`.
  # minio.yml must be included alongside this file for test data.
  renderer:
    build:
      context: ../../services/rendering-job
      dockerfile: ../../docker/Dockerfile.kit
      additional_contexts:
        graph-builder: ../../services/asset-graph-builder
    container_name: deepsearch-render
    environment:
      - OV_USERNAME=${OV_USERNAME:-}
      - OV_PASSWORD=${OV_PASSWORD:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-undefined}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-undefined}
      - NUCLEUS_ACCESS_TOKEN_VDC_SAMPLE=${NUCLEUS_ACCESS_TOKEN_VDC_SAMPLE:-undefined}
      - STORAGE_API_GRPC_ENDPOINT=${STORAGE_API_GRPC_ENDPOINT:-localhost:50051}
      - SKIP_VDC_SAMPLE_TESTS=${SKIP_VDC_SAMPLE_TESTS:-true}
      - SKIP_SIMREADY_TESTS=${SKIP_SIMREADY_TESTS:-true}
      - SEVAN_DEV_CLIENT_ID=${SEVAN_DEV_CLIENT_ID:-undefined}
      - SEVAN_DEV_CLIENT_SECRET=${SEVAN_DEV_CLIENT_SECRET:-undefined}
      - SEVAN_TOKEN_URL=${SEVAN_TOKEN_URL:-undefined}
      - SEVAN_DEV_SCOPE=${SEVAN_DEV_SCOPE:-undefined}
      - KIT_WORKER_SETTINGS_N_WORKERS=1
      - KIT_WORKER_SETTINGS_BATCH_SIZE=1
      - RENDERING_SERVICE_SETTINGS_KIT_WORKER_MEMORY_LIMIT=25600
      - MINIO_ENDPOINT=http://minio:9000
      - HOME=/home/ubuntu
      - LOGGING_CONFIG=/logging.yml
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/docs').raise_for_status()"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /usr/share/nvidia/nvoptix.bin:/usr/share/nvidia/nvoptix.bin:ro
      - ../../cache/shadercache:/root/.cache/ov/shaders
      - ../../services/rendering-job/deepsearch_rendering_job/logging.yml:/logging.yml:ro
