services:
  siglip2-triton:
    container_name: usdsearch-siglip2-triton
    restart: unless-stopped
    # Override the base build (which bakes models into the image) with a
    # local-dev variant that mounts model_repo/ from the host. Drops the
    # 7.2 GB image bloat and avoids re-COPYing the weights on every rebuild.
    build:
      context: ../../services/siglip2-triton/docker
      dockerfile: ../../../docker/Dockerfile.siglip2-triton.local
    volumes:
      - ../../services/siglip2-triton/model_repo:/models:ro
    healthcheck:
      retries: 10
      start_period: 60s
