services:
  explorer:
    build:
      # Public, self-contained image: serves the pre-built generic bundle
      # tracked at services/explorer/dist/ (bitnami nginx on :8080). The bundle
      # is generic — empty REACT_APP_API_URL (same-origin /api/, which the
      # gateway proxies to deepsearch-api) and a usd* include filter — so no
      # build args are needed here. To bake different defaults (API URL, server
      # mapping, cutoff, extensions), use the internal build path
      # (scripts/build-explorer.sh + docker/Dockerfile.explorer-internal) and
      # set `image:` to the result.
      context: ../../
      dockerfile: docker/Dockerfile.explorer
    container_name: deepsearch-explorer
    ports:
      - "${EXPLORER_PORT:-3000}:8080"
    depends_on:
      - deepsearch-api
