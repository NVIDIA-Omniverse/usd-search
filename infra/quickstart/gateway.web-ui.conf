server {
    listen 0.0.0.0:8080;
    http2 on;

    # Use Docker's embedded DNS resolver (handles container restarts).
    # Setting the resolver lets nginx resolve variables at request time,
    # avoiding "host not found" crashes when upstreams start later.
    resolver 127.0.0.11 valid=10s;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- CORS headers (applied to all responses, including 204 preflight) ---
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-api-key, x-usdsearch-storage-backend" always;
    add_header Access-Control-Max-Age 3600 always;

    # --- CORS preflight (short-circuit for any path) ---
    # nginx forbids add_header inside `if` at server context, so we just
    # return 204; the `always` headers above apply to the 204 response.
    if ($request_method = OPTIONS) {
        return 204;
    }

    # --- Search API routes (rewrite to deepsearch-api internal paths) ---
    location /search {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/search(.*)$ /v2/deepsearch/search$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /search_hybrid {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/search_hybrid(.*)$ /v3/deepsearch/search$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /llm_parse/ {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/llm_parse/(.*)$ /v3/deepsearch/llm_parse/$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /vlm_validate/ {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/vlm_validate/(.*)$ /v3/deepsearch/vlm_validate/$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /images {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/images(.*)$ /v3/images$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /download {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/download(.*)$ /v3/download$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Bundling an asset + all its dependencies can take longer than a single thumbnail.
        proxy_read_timeout 300s;
    }

    # --- Info endpoint ---
    location /info {
        set $info_upstream http://info-endpoint:8000;
        proxy_pass $info_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /process {
        set $info_upstream http://info-endpoint:8000;
        proxy_pass $info_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Asset Graph Service ---
    location /asset_graph/ {
        set $ags_upstream http://asset-graph-service:8000;
        proxy_pass $ags_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dependency_graph {
        set $ags_upstream http://asset-graph-service:8000;
        proxy_pass $ags_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API docs (Swagger UI for merged OpenAPI spec) ---
    location = /docs {
        return 302 /docs/;
    }

    location /docs/ {
        alias /usr/share/nginx/docs/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # --- Explorer UI mounted at /ui ---
    # Bare "/" → redirect to "/ui/" (canonical UI location)
    location = / {
        return 302 /ui/;
    }

    # "/ui" (no trailing slash) → "/ui/"
    location = /ui {
        return 302 /ui/;
    }

    # "/ui/*" → strip prefix, proxy to explorer container
    location /ui/ {
        set $explorer_upstream http://explorer:8080;
        rewrite ^/ui/(.*)$ /$1 break;
        proxy_pass $explorer_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # --- Explorer static assets (CRA emits absolute /static/... paths) ---
    location /static/ {
        set $explorer_upstream http://explorer:8080;
        proxy_pass $explorer_upstream;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # --- Root-level static files (favicon, manifest, logos, robots.txt) ---
    # Fallback: anything not matched above is forwarded to the explorer
    # container so its built-in static files (favicon.ico, manifest.json,
    # logo*.png, robots.txt, ds.png) load correctly.
    location / {
        set $explorer_upstream http://explorer:8080;
        proxy_pass $explorer_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
