# Gateway: proxy ALL API to the staging deepsearch-horde instance.
#
# Reproduces exactly what http://api.staging.deepsearch-horde.nvidia.com/ serves
# (search, images, dependency_graph, asset_graph, download, llm_parse, vlm_validate
# — all working, public, no auth), but renders our locally-built redesigned
# Explorer on top. The only local components are explorer + this gateway; every
# API call is proxied straight to staging, so graphs/dependencies/downloads work
# identically to that site.

server {
    listen 0.0.0.0:8080;
    http2 on;

    resolver 8.8.8.8 127.0.0.11 valid=10s;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 300s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-api-key, x-usdsearch-storage-backend" always;
    add_header Access-Control-Max-Age 3600 always;
    if ($request_method = OPTIONS) {
        return 204;
    }

    set $remote http://api.staging.deepsearch-horde.nvidia.com;
    set $remote_host api.staging.deepsearch-horde.nvidia.com;

    # --- All API surface -> staging (public, no auth) ------------------------
    location /search        { proxy_pass $remote; proxy_set_header Host $remote_host; }
    location /search_hybrid { proxy_pass $remote; proxy_set_header Host $remote_host; }
    location /images        { proxy_pass $remote; proxy_set_header Host $remote_host; }
    location /llm_parse     { proxy_pass $remote; proxy_set_header Host $remote_host; }
    location /vlm_validate  { proxy_pass $remote; proxy_set_header Host $remote_host; }
    location /asset_graph   { proxy_pass $remote; proxy_set_header Host $remote_host; }
    location /dependency_graph { proxy_pass $remote; proxy_set_header Host $remote_host; }
    location /info          { proxy_pass $remote; proxy_set_header Host $remote_host; }
    location /process       { proxy_pass $remote; proxy_set_header Host $remote_host; }
    location /download {
        proxy_pass $remote;
        proxy_set_header Host $remote_host;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # --- API docs ---
    location = /docs { return 302 /docs/; }
    location /docs/ {
        alias /usr/share/nginx/docs/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # --- Local redesigned Explorer UI ---
    location = / { return 302 /ui/; }
    location = /ui { return 302 /ui/; }
    location /ui/ {
        set $explorer_upstream http://explorer:8080;
        rewrite ^/ui/(.*)$ /$1 break;
        proxy_pass $explorer_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }
    location /static/ {
        set $explorer_upstream http://explorer:8080;
        proxy_pass $explorer_upstream;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400, immutable";
    }
    location / {
        set $explorer_upstream http://explorer:8080;
        proxy_pass $explorer_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
