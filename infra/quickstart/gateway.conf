server {
    listen 0.0.0.0:8080;
    http2 on;

    # Use Docker's embedded DNS resolver (handles container restarts).
    # Setting the resolver lets nginx resolve variables at request time,
    # avoiding "host not found" crashes when upstreams start later.
    resolver 127.0.0.11 valid=10s;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- CORS headers (applied to all responses, including 204 preflight) ---
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-api-key, x-usdsearch-storage-backend" always;
    add_header Access-Control-Max-Age 3600 always;

    # --- CORS preflight (short-circuit for any path) ---
    # nginx forbids add_header inside `if` at server context, so we just
    # return 204; the `always` headers above apply to the 204 response.
    if ($request_method = OPTIONS) {
        return 204;
    }

    # --- Search API routes (rewrite to deepsearch-api internal paths) ---
    location /search {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/search(.*)$ /v2/deepsearch/search$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /search_hybrid {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/search_hybrid(.*)$ /v3/deepsearch/search$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /vlm_validate/search_result {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/vlm_validate/search_result(.*)$ /v3/deepsearch/vlm_validate/search_result$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /images {
        set $api_upstream http://deepsearch-api:8000;
        rewrite ^/images(.*)$ /v3/images$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Info endpoint ---
    location /info {
        set $info_upstream http://info-endpoint:8000;
        proxy_pass $info_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /process {
        set $info_upstream http://info-endpoint:8000;
        proxy_pass $info_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Asset Graph Service ---
    location /asset_graph/ {
        set $ags_upstream http://asset-graph-service:8000;
        proxy_pass $ags_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /dependency_graph {
        set $ags_upstream http://asset-graph-service:8000;
        proxy_pass $ags_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API docs (Swagger UI for merged OpenAPI spec) ---
    location = /docs {
        return 302 /docs/;
    }

    location /docs/ {
        alias /usr/share/nginx/docs/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # --- Root landing ---
    # No WebUI in this config — bare "/" points users at the API docs.
    # The web-ui overlay (docker-compose.web-ui.yml) swaps this volume for
    # gateway.web-ui.conf, which adds /, /ui/, /static/, and the catch-all
    # explorer routes.
    location = / {
        return 302 /docs/;
    }
}
