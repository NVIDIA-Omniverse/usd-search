repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-yaml
        exclude: (\.gitlab-ci\.yml|docker-compose\.web-ui\.yml|infra/compose/openapi-merge\.yml)
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-added-large-files
-   repo: local
    hooks:
    -   id: format
        name: Run isort + black via ./format.sh
        entry: ./format.sh
        language: system
        types: [python]
        pass_filenames: true
-   repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
    -   id: flake8
        args:
        - "--exclude=*test*,*stubs*"
        - "--ignore=E501,W503,E203"
-   repo: local
    hooks:
    -   id: apply-spdx-headers
        name: Apply SPDX/Apache-2.0 license headers
        entry: python3 scripts/apply_spdx_headers.py
        language: system
        files: \.(py|pyi|sh|bash|yml|yaml|js|jsx|ts|tsx|proto|lua)$|(^|/)Dockerfile($|\.[^/]+$)|^ci/skills/[^/]+/mocks/[^/]+$
        pass_filenames: true
