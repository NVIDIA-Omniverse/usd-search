# WebUI — optional overlay for the Explorer React front-end.
#
# Adds:
#   - explorer service (React SPA, built from docker/Dockerfile.explorer)
#   - swaps the gateway nginx config from gateway.conf (no UI) to
#     gateway.web-ui.conf, which adds /, /ui/, /static/, and the
#     root-static catch-all that proxies to the explorer container.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.web-ui.yml up
#
# Without this overlay, the gateway's "/" redirects to "/docs/" (Swagger
# UI for the API). With this overlay, "/" redirects to "/ui/" (Explorer).
#
# Requires Docker Compose >= v2.20 for the `!override` volumes tag below.

services:
  explorer:
    build:
      context: .
      dockerfile: docker/Dockerfile.explorer
      args:
        REACT_APP_API_URL: ""
        REACT_APP_VERSION: "${REACT_APP_VERSION:-}"
        REACT_APP_DEFAULT_EMBEDDING_FIELD_NAME: ${REACT_APP_DEFAULT_EMBEDDING_FIELD_NAME:-siglip2-embedding.embedding}
        REACT_APP_DEFAULT_EMBEDDING_DIMENSION: ${REACT_APP_DEFAULT_EMBEDDING_DIMENSION:-1536}
        # Default search-form values baked into the SPA at build time.
        # Empty cutoff = no similarity cutoff sent unless the user enters one.
        REACT_APP_DEFAULT_CUTOFF_THRESHOLD: ${REACT_APP_DEFAULT_CUTOFF_THRESHOLD:-}
        REACT_APP_DEFAULT_FILE_EXTENSION_INCLUDE: ${REACT_APP_DEFAULT_FILE_EXTENSION_INCLUDE:-usd*}
    container_name: usdsearch-explorer
    restart: unless-stopped
    # bitnami nginx serves the static SPA from /app on :8080 by default — no
    # config mount needed. The gateway routes /ui and the APIs.
    # The bitnami image has no wget/curl, so probe the port with a bash
    # /dev/tcp connect instead.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Swap the gateway's default.conf for the WebUI-enabled variant and make
  # the gateway wait for the explorer to be up. `!override` replaces the
  # base volume list wholesale — without it, compose would append a second
  # bind mount to /etc/nginx/conf.d/default.conf and conflict with the
  # base mount.
  gateway:
    volumes: !override
      - ./infra/quickstart/gateway.web-ui.conf:/etc/nginx/conf.d/default.conf:ro
      - ./helm/usdsearch/docs/index.html:/usr/share/nginx/docs/index.html:ro
      - ./helm/usdsearch/docs/openapi.json:/usr/share/nginx/docs/openapi.json:ro
    depends_on:
      explorer:
        condition: service_healthy
