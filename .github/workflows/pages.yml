name: Publish API docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - helm/usdsearch/docs/openapi.json
      - scripts/build-openapi-static-html.sh
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Render Redoc HTML from openapi.json
        run: ./scripts/build-openapi-static-html.sh

      - name: Stage Pages artifact
        run: |
          mkdir -p public
          cp docs/openapi.html public/index.html
          cp helm/usdsearch/docs/openapi.json public/openapi.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
